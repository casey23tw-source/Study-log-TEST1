// ─── Google Drive Sync ────────────────────────────────────────────────────────
let gToken = null;

async function gDriveRequest(method, url, body, token) {
  const res = await fetch(url, {
    method,
    headers: {
      Authorization: `Bearer ${token||gToken}`,
      "Content-Type": "application/json",
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error("Drive error " + res.status);
  return res.json();
}

async function findFile(token) {
  const r = await gDriveRequest("GET",
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id)`,
    null, token);
  const files = r.files || [];
  return files.length > 0 ? files[0].id : null;
}

async function downloadData(fileId, token) {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${token||gToken}` } }
  );
  if (!res.ok) throw new Error("Download error");
  return res.json();
}

async function uploadData(data, fileId, token) {
  const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
  if (fileId) {
    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      { method: "PATCH", headers: { Authorization: `Bearer ${token||gToken}`, "Content-Type": "application/json" }, body: blob }
    );
    if (!res.ok) throw new Error("Upload error");
    return fileId;
  } else {
    const meta = await gDriveRequest("POST",
      "https://www.googleapis.com/drive/v3/files?fields=id",
      { name: FILE_NAME, parents: ["appDataFolder"] }, token);
    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${meta.id}?uploadType=media`,
      { method: "PATCH", headers: { Authorization: `Bearer ${token||gToken}`, "Content-Type": "application/json" }, body: blob }
    );
    if (!res.ok) throw new Error("Upload error");
    return meta.id;
  }
}

function App() {
  const [page, setPage] = useState("dashboard");
  const [records, setRecords] = useState(() => load("st2_records", []));
  const [subjects, setSubjects] = useState(() => load("st2_subjects", [
    {id:"1",name:"數學",color:"#f0a500"},{id:"2",name:"英文",color:"#00d4aa"}
  ]));
  const [chapters, setChapters] = useState(() => load("st2_chapters", []));
  const [goals, setGoals] = useState(() => load("st2_goals", {daily:120,weekly:840}));
  const [exam, setExam] = useState(() => load("st2_exam", {date:"",name:""}));
  const [modal, setModal] = useState(null);
  const [timer, setTimer] = useState({on:false,start:null,subId:"",elapsed:0});
  const [toast, setToast] = useState(null);
  const [user, setUser] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [syncStatus, setSyncStatus] = useState(null); // "ok" | "error" | null
  const [driveFileId, setDriveFileId] = useState(null);
  const timerRef = useRef(null);
  const syncTimer = useRef(null);
  const today = todayStr();

  useEffect(()=>{save("st2_records",records);},[records]);
  useEffect(()=>{save("st2_subjects",subjects);},[subjects]);
  useEffect(()=>{save("st2_chapters",chapters);},[chapters]);
  useEffect(()=>{save("st2_goals",goals);},[goals]);
  useEffect(()=>{save("st2_exam",exam);},[exam]);

  // ── Auto-sync to Drive 30s after any data change ──────────────────────────
  useEffect(()=>{
    if(!user) return;
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(()=>syncToDrive(), 30000);
    return ()=>clearTimeout(syncTimer.current);
  },[records,subjects,chapters,goals,exam,user]);

  // ── Google Sign-In ─────────────────────────────────────────────────────────
  useEffect(()=>{
    const interval = setInterval(()=>{
      if(window.google && window.google.accounts && window.google.accounts.id){
        clearInterval(interval);
        window.google.accounts.id.initialize({
          client_id: CLIENT_ID,
          callback: handleCredential,
          auto_select: true,
        });
        // Try silent sign-in first
        window.google.accounts.id.prompt();
      }
    }, 300);
    return ()=>clearInterval(interval);
  },[]);

  const handleCredential = async (res) => {
    try {
      // Decode JWT to get user info
      const payload = JSON.parse(atob(res.credential.split('.')[1]));
      // Get OAuth2 token for Drive access
      const client = window.google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (tokenRes) => {
          if(tokenRes.error) return;
          gToken = tokenRes.access_token;
          setUser({ name: payload.name, email: payload.email, picture: payload.picture });
          showToast("✦ 已登入 " + payload.name);
          // Load from Drive on sign-in
          await loadFromDrive(tokenRes.access_token);
        },
      });
      client.requestAccessToken({ prompt: "" });
    } catch(e) { console.error(e); }
  };

  const signIn = () => {
    if(!window.google) return;
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (tokenRes) => {
        if(tokenRes.error){ showToast("登入失敗","#f87171"); return; }
        gToken = tokenRes.access_token;
        // Get user info
        const r = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
          headers: { Authorization: `Bearer ${gToken}` }
        });
        const info = await r.json();
        setUser({ name: info.name, email: info.email, picture: info.picture });
        showToast("✦ 已登入 " + info.name);
        await loadFromDrive(gToken);
      },
    });
    client.requestAccessToken({ prompt: "consent" });
  };

  const signOut = () => {
    if(gToken && window.google && window.google.accounts && window.google.accounts.oauth2){
      window.google.accounts.oauth2.revoke(gToken, ()=>{});
    }
    gToken = null;
    setUser(null);
    setDriveFileId(null);
    setSyncStatus(null);
    showToast("✦ 已登出");
  };

  const loadFromDrive = async (token) => {
    try {
      setSyncing(true);
      const fileId = await findFile(token);
      if(fileId){
        const data = await downloadData(fileId, token);
        setDriveFileId(fileId);
        // Merge: Drive data wins on conflict
        if(data.records)  setRecords(data.records);
        if(data.subjects) setSubjects(data.subjects);
        if(data.chapters) setChapters(data.chapters);
        if(data.goals)    setGoals(data.goals);
        if(data.exam)     setExam(data.exam);
        setSyncStatus("ok");
        showToast("✦ 雲端資料已載入");
      } else {
        // First time: upload local data
        const id = await uploadData({ records, subjects, chapters, goals, exam }, null, token);
        setDriveFileId(id);
        setSyncStatus("ok");
        showToast("✦ 本機資料已備份至雲端");
      }
    } catch(e) {
      setSyncStatus("error");
      showToast("同步失敗，請重試","#f87171");
    } finally { setSyncing(false); }
  };

  const syncToDrive = async () => {
    if(!gToken || !user) return;
    try {
      setSyncing(true);
      const data = { records, subjects, chapters, goals, exam, updatedAt: new Date().toISOString() };
      let fid = driveFileId;
      if(!fid){ fid = await findFile(gToken); setDriveFileId(fid); }
      const newId = await uploadData(data, fid, gToken);
      if(!fid) setDriveFileId(newId);
      setSyncStatus("ok");
    } catch(e) {
      setSyncStatus("error");
    } finally { setSyncing(false); }
  };

  const syncNow = async () => {
    if(!user){ showToast("請先登入 Google","#f87171"); return; }
    await syncToDrive();
    showToast("✦ 已同步至雲端");
  };

  useEffect(()=>{
    if(timer.on){timerRef.current=setInterval(()=>setTimer(t=>({...t,elapsed:Math.floor((Date.now()-t.start)/1000)})),1000);}

    return ()=>clearInterval(timerRef.current);

  const delRecord = (id) => setRecords(p=>p.filter(r=>r.id!==id));
  const startTimer = (subId) => setTimer({on:true,start:Date.now(),subId,elapsed:0});
  const stopTimer = () => {
    const mins=Math.round(timer.elapsed/60);
    if(mins>0&&timer.subId){
      const now=new Date(),st=new Date(timer.start);
      const f2=(d)=>d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
      addRecord({date:today,startTime:f2(st),endTime:f2(now),subjectId:timer.subId,duration:mins,note:"計時模式",type:"new"});
      showToast(`✦ 已儲存 ${hhmm(mins)}`);
    }
    setTimer({on:false,start:null,subId:"",elapsed:0});
  };

  const todayMins=records.filter(r=>r.date===today).reduce((s,r)=>s+r.duration,0);
  const wkStart=weekStart();
  const weekMins=records.filter(r=>r.date>=wkStart).reduce((s,r)=>s+r.duration,0);
  const monthMins=records.filter(r=>r.date.startsWith(today.slice(0,7))).reduce((s,r)=>s+r.duration,0);
  const totalMins=records.reduce((s,r)=>s+r.duration,0);
  const subMins=subjects.map(s=>({...s,mins:records.filter(r=>r.subjectId===s.id).reduce((a,r)=>a+r.duration,0)})).sort((a,b)=>b.mins-a.mins);
  const examDays=exam.date?diffDays(today,exam.date):null;
  const todayDue=chapters.filter(c=>c.nextReview&&c.nextReview<=today&&c.completed);
  const streakDays=(()=>{
    const days=[...new Set(records.map(r=>r.date))].sort().reverse();
    let s=0,cur=today;
    for(const d of days){if(d===cur){s++;cur=addDays(cur,-1);}else if(d<cur)break;}
    return s;
  })();

  const completeReview=(cid)=>{
    setChapters(p=>p.map(c=>{
      if(c.id!==cid)return c;
      const next=c.reviewCount+1;
      return{...c,reviewCount:next,lastReview:today,nextReview:addDays(today,SR_INTERVALS[Math.min(next,SR_INTERVALS.length-1)])};
    }));
    showToast("✦ 複習完成！");
  };
  const markRead=(cid)=>{
    setChapters(p=>p.map(c=>{
      if(c.id!==cid||c.completed)return c;
      return{...c,completed:true,firstRead:today,reviewCount:0,nextReview:addDays(today,SR_INTERVALS[0])};
    }));
    showToast("✦ 章節完成，已排入複習！");
  };

  const nav=[
    {id:"dashboard",n:"home",lbl:"儀表板"},
    {id:"record",n:"list",lbl:"紀錄"},
    {id:"stats",n:"chart",lbl:"統計"},
    {id:"subjects",n:"book",lbl:"科目"},
    {id:"chapters",n:"layers",lbl:"章節"},
    {id:"review",n:"refresh",lbl:"複習"},
    {id:"behavior",n:"trophy",lbl:"成就"},

                          <div style={{fontSize:11,color:"#444"}}>{r.startTime}–{r.endTime}{r.note&&r.note!=="計時模式"?` · ${r.note}`:""}</div>

                    <span style={{fontSize:11,color:"#555"}}><span style={{color:"#888",fontFamily:"'DM Mono',monospace"}}>{hhmmLong(m)}</span></span>

                    {dueCount>0&&<Tag color="#f0a500" bg="#1a1000">{STAR} {dueCount} 待複習</Tag>}
                  </div>
                  {chaps.length>0&&(
                    <div style={{marginTop:8}}>
                      <div style={{height:3,background:"#1a1a2e",borderRadius:3,overflow:"hidden"}}>

              </div>

          );
        })}
      </div>
    );

  // ── Chapters ─────────────────────────────────────────────────────────────────
  function ChaptersPage() {
    const [sel,setSel]=useState(subjects[0]?.id||"");
    const sub=subjects.find(s=>s.id===sel);
    const chaps=chapters.filter(c=>c.subjectId===sel);
    const done=chaps.filter(c=>c.completed).length;
    return(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:800,color:"#eeeeff"}}>{STAR} 章節追蹤</div>
          <Btn sm onClick={()=>setModal({type:"addChapter",subjectId:sel})} disabled={!sel}><Ic n="plus" size={13}/> 新增章節</Btn>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {subjects.map(s=>{
            const active=s.id===sel;
            const cnt=chapters.filter(c=>c.subjectId===s.id&&c.nextReview&&c.nextReview<=today&&c.completed).length;
            return(
              <button key={s.id} onClick={()=>setSel(s.id)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${active?s.color:"#222240"}`,background:active?`${s.color}22`:"transparent",color:active?s.color:"#555",fontSize:12,fontWeight:active?700:400,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                {s.name}{cnt>0&&<span style={{background:s.color,color:"#000",borderRadius:8,padding:"0 4px",fontSize:9,fontWeight:800}}>{cnt}</span>}
              </button>
            );
          })}
        </div>
        {chaps.length>0&&(
          <Card style={{padding:"11px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:11,color:"#555"}}>完成進度</span>
              <span style={{fontSize:11,color:"#888",fontFamily:"'DM Mono',monospace"}}>{done}/{chaps.length}</span>
            </div>
            <div style={{height:4,background:"#1a1a2e",borderRadius:4}}>
              <div style={{height:"100%",width:`${chaps.length>0?(done/chaps.length)*100:0}%`,background:sub?.color||"#f0a500",borderRadius:4}}/>
            </div>
          </Card>
        )}
        {chaps.length===0&&<div style={{color:"#333",textAlign:"center",padding:48,fontSize:13}}>尚無章節，點右上角新增</div>}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {chaps.map(c=>{
            const overdue=c.nextReview&&c.nextReview<=today&&c.completed;
            return(
              <div key={c.id} style={{background:"#111128",border:`1px solid ${overdue?"#3a2a0a":"#1e1e3a"}`,borderRadius:10,padding:"11px 13px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                      <span style={{width:6,height:6,borderRadius:"50%",background:c.completed?"#4ade80":"#333",flexShrink:0}}/>
                      <span style={{fontSize:12,fontWeight:600,color:c.completed?"#eeeeff":"#777"}}>{c.name}</span>
                      {overdue&&<Tag color="#f0a500" bg="#1a1000">{STAR} 今日複習</Tag>}
                    </div>
                    {c.completed?(
                      <div style={{fontSize:11,color:"#444",display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                        <Tag color="#60a5fa">{SR_LABELS[Math.min(c.reviewCount,SR_LABELS.length-1)]}</Tag>
                        <span>首讀 {c.firstRead}</span>
                        <span>複習 {c.reviewCount} 次</span>
                        {c.nextReview&&<span style={{color:overdue?"#f0a500":"#444"}}>下次 {c.nextReview}</span>}
                      </div>
                    ):<div style={{fontSize:11,color:"#333"}}>未完成閱讀</div>}
                  </div>
                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    {!c.completed&&<Btn v="dim" sm onClick={()=>markRead(c.id)}><Ic n="check" size={10}/> 完成</Btn>}
                    <button onClick={()=>setChapters(p=>p.filter(x=>x.id!==c.id))} style={{background:"none",border:"none",color:"#333",cursor:"pointer",padding:2,lineHeight:0}}
                      onMouseEnter={e=>e.currentTarget.style.color="#f87171"}
                      onMouseLeave={e=>e.currentTarget.style.color="#333"}><Ic n="trash" size={12}/></button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Review ───────────────────────────────────────────────────────────────────
  function ReviewPage() {
    const all=chapters.filter(c=>c.completed&&c.nextReview).sort((a,b)=>a.nextReview.localeCompare(b.nextReview));
    const due=all.filter(c=>c.nextReview<=today);
    const soon=all.filter(c=>c.nextReview>today&&diffDays(today,c.nextReview)<=7);
    const later=all.filter(c=>c.nextReview>today&&diffDays(today,c.nextReview)>7);
    const Row=({c,isDue})=>{
      const sub=subjects.find(s=>s.id===c.subjectId);
      const d=diffDays(today,c.nextReview);
      return(
        <div style={{background:"#111128",border:`1px solid ${isDue?"#3a2a0a":"#1e1e3a"}`,borderRadius:10,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2,flexWrap:"wrap"}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:sub?.color||"#888",flexShrink:0}}/>
              <span style={{fontSize:12,fontWeight:600,color:"#ddd"}}>{c.name}</span>
              <span style={{fontSize:10,color:sub?.color||"#888"}}>{sub?.name}</span>
              <Tag color="#60a5fa">{SR_LABELS[Math.min(c.reviewCount,SR_LABELS.length-1)]}</Tag>
            </div>
            <div style={{fontSize:10,color:"#444"}}>
              第 {c.reviewCount+1} 次 · {isDue?"今日到期":d===1?"明天":`${d+1}天後`} · 下次間隔 {SR_INTERVALS[Math.min(c.reviewCount+1,SR_INTERVALS.length-1)]} 天
            </div>
          </div>
          {isDue&&<Btn v="teal" sm onClick={()=>{completeReview(c.id);addRecord({date:today,startTime:"--:--",endTime:"--:--",subjectId:c.subjectId,duration:30,note:`複習：${c.name}`,type:"review"});}}><Ic n="check" size={10}/> 完成</Btn>}
        </div>
      );
    };
    return(
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:18,fontWeight:800,color:"#eeeeff"}}>{STAR} 複習排程</div>
        <Card style={{padding:"13px 16px"}}>
          <div style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>記憶曲線間隔</div>
          <div style={{display:"flex",gap:2}}>
            {SR_INTERVALS.map((d,i)=>(
              <div key={i} style={{flex:1,textAlign:"center"}}>
                <div style={{height:3,background:`hsl(${220-i*20},70%,${35+i*5}%)`,borderRadius:2,marginBottom:3}}/>
                <div style={{fontSize:8,color:"#444"}}>{d}天</div>
              </div>
            ))}
          </div>
        </Card>
        {due.length>0&&<div>
          <div style={{fontSize:12,fontWeight:700,color:"#f0a500",marginBottom:6}}>{STAR} 今日應複習 ({due.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>{due.map(c=><Row key={c.id} c={c} isDue/>)}</div>
        </div>}
        {soon.length>0&&<div>
          <div style={{fontSize:12,fontWeight:700,color:"#60a5fa",marginBottom:6,marginTop:4}}>本週即將複習 ({soon.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>{soon.map(c=><Row key={c.id} c={c} isDue={false}/>)}</div>
        </div>}
        {later.length>0&&<div>
          <div style={{fontSize:12,fontWeight:700,color:"#444",marginBottom:6,marginTop:4}}>未來排程</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>{later.slice(0,8).map(c=><Row key={c.id} c={c} isDue={false}/>)}</div>
        </div>}
        {all.length===0&&<div style={{color:"#333",textAlign:"center",padding:48,fontSize:13}}>完成章節後系統自動排入複習</div>}
      </div>
    );
  }

  // ── Behavior ─────────────────────────────────────────────────────────────────
  function BehaviorPage() {
    const uniqDays=[...new Set(records.map(r=>r.date))];
    const bestDay=uniqDays.map(d=>({d,m:records.filter(r=>r.date===d).reduce((s,r)=>s+r.duration,0)})).sort((a,b)=>b.m-a.m)[0];
    const heatDays=Array.from({length:70},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(69-i));return d.toISOString().slice(0,10);});
    const heatMax=Math.max(...heatDays.map(d=>records.filter(r=>r.date===d).reduce((s,r)=>s+r.duration,0)),1);
    return(
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:18,fontWeight:800,color:"#eeeeff"}}>{STAR} 成就總覽</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[
            {lbl:"連續天數",v:streakDays,unit:"天",color:"#f0a500"},
            {lbl:"讀書日數",v:uniqDays.length,unit:"天",color:"#00d4aa"},
            {lbl:"總讀書",v:`${Math.floor(totalMins/60)}`,unit:"小時",color:"#60a5fa"},
          ].map(x=>(
            <Card key={x.lbl} style={{textAlign:"center",padding:"14px 10px"}}>
              <div style={{fontSize:9,color:"#555",letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>{x.lbl}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:26,fontWeight:800,color:x.color,lineHeight:1}}>{x.v}</div>
              <div style={{fontSize:10,color:"#555",marginTop:3}}>{x.unit}</div>
            </Card>
          ))}
        </div>
        <Card>
          <div style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>讀書熱度圖 (近10週) {STAR}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:2}}>
            {Array.from({length:10},(_,week)=>(
              <div key={week} style={{display:"flex",flexDirection:"column",gap:2}}>
                {Array.from({length:7},(_,dow)=>{
                  const d=heatDays[week*7+dow];
                  if(!d)return<div key={dow} style={{height:11,borderRadius:2}}/>;
                  const m=records.filter(r=>r.date===d).reduce((s,r)=>s+r.duration,0);
                  const intensity=m/heatMax;
                  const bg=m===0?"#111":`hsl(43,${40+intensity*60}%,${15+intensity*35}%)`;
                  return<div key={dow} title={`${fmtDate(d)}: ${hhmm(m)}`} style={{height:11,borderRadius:2,background:bg}}/>;
                })}
              </div>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:3,alignItems:"center",marginTop:7}}>
            <span style={{fontSize:9,color:"#444"}}>少</span>
            {[0,.25,.5,.75,1].map(i=><div key={i} style={{width:9,height:9,borderRadius:2,background:i===0?"#111":`hsl(43,${40+i*60}%,${15+i*35}%)`}}/>)}
            <span style={{fontSize:9,color:"#444"}}>多</span>
          </div>
        </Card>
        <Card>
          <div style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>科目排行 {STAR}</div>
          {subMins.map((s,i)=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:18,height:18,borderRadius:4,background:i<3?["#f0a500","#aaa","#cd7f32"][i]:"#1a1a2e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:i<3?"#000":"#444",flexShrink:0}}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,color:s.color,fontWeight:600}}>{s.name}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#888"}}>{hhmmLong(s.mins)}</span>
                </div>
                <div style={{height:3,background:"#1a1a2e",borderRadius:3}}>
                  <div style={{height:"100%",width:`${(s.mins/Math.max(subMins[0]?.mins,1))*100}%`,background:s.color,borderRadius:3}}/>
                </div>
              </div>
            </div>
          ))}
        </Card>
        {bestDay&&(
          <Card style={{padding:"13px 16px"}}>
            <div style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>最佳單日 {STAR}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:13,color:"#888"}}>{fmtDateFull(bestDay.d)}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:800,color:"#f472b6"}}>{hhmmLong(bestDay.m)}</div>
            </div>
          </Card>
        )}
      </div>
    );
  }

        })}
        <Card>
          <div style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{STAR} 小技巧</div>
          {[
            ["計時器換科目","先停止目前計時，再對新科目按計時。"],
            ["補記過去的紀錄","新增紀錄時修改日期欄位即可，無日期限制。"],
            ["複習紀錄時長","預設記錄30分鐘，如需精確可在「紀錄」頁刪除重補。"],
            ["連續天數計算","當天有任何紀錄（含複習）即算一天。"],
          ].map(([t,d],i)=>(
            <div key={i} style={{display:"flex",gap:9,padding:"8px 0",borderBottom:i<3?"1px solid #111130":"none"}}>
              <span style={{color:"#f0a500",fontSize:12,flexShrink:0}}>✦</span>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:"#ccc",marginBottom:1}}>{t}</div>
                <div style={{fontSize:11,color:"#555",lineHeight:1.5}}>{d}</div>
              </div>
            </div>
          ))}
        </Card>
      </div>
    );
  }

  // ── Modals ───────────────────────────────────────────────────────────────────
  function AddRecordModal() {
    const [f,setF]=useState({date:today,startTime:"09:00",endTime:"10:00",subjectId:subjects[0]?.id||"",note:"",type:"new"});
    const dur=calcDur(f.startTime,f.endTime);
    const s=k=>e=>setF(v=>({...v,[k]:e.target.value}));
    const ok=()=>{ if(dur>0&&f.subjectId){addRecord({...f,duration:dur});showToast(`✦ 已新增 ${hhmm(dur)}`);setModal(null);} };
    return(
      <Modal title="新增讀書紀錄" onClose={()=>setModal(null)}>
        <F label="日期"><Inp type="date" value={f.date} onChange={s("date")}/></F>
        <div style={{display:"flex",gap:10}}>
          <F label="開始" half><Inp type="time" value={f.startTime} onChange={s("startTime")}/></F>
          <F label="結束" half><Inp type="time" value={f.endTime} onChange={s("endTime")}/></F>
        </div>
        <div style={{background:"#0d0d1a",borderRadius:8,padding:"8px 12px",marginBottom:14,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:11,color:"#555"}}>時長</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:"#f0a500"}}>{hhmmLong(dur)}</span>
        </div>
        <div style={{display:"flex",gap:10}}>
          <F label="科目" half><Sel value={f.subjectId} onChange={s("subjectId")}>{subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Sel></F>
          <F label="類型" half><Sel value={f.type} onChange={s("type")}><option value="new">新學習</option><option value="review">複習</option></Sel></F>
        </div>
        <F label="備註（可選）"><Tex value={f.note} onChange={s("note")} placeholder="備註…"/></F>
        <Btn onClick={ok} style={{width:"100%",justifyContent:"center"}}><Ic n="check" size={13}/> 儲存紀錄</Btn>
      </Modal>
    );
  }

  function SubjectModal({existing}) {
    const [name,setName]=useState(existing?.name||"");
    const [color,setColor]=useState(existing?.color||PALETTE[subjects.length%PALETTE.length]);
    const ok=()=>{
      if(!name.trim())return;
      if(existing)setSubjects(p=>p.map(s=>s.id===existing.id?{...s,name,color}:s));
      else setSubjects(p=>[...p,{id:Date.now().toString(),name,color}]);
      setModal(null);showToast(`✦ ${existing?"已更新":"已新增"} ${name}`);
    };
    return(
      <Modal title={existing?"編輯科目":"新增科目"} onClose={()=>setModal(null)}>
        <F label="名稱"><Inp value={name} onChange={e=>setName(e.target.value)} placeholder="例：數學"/></F>
        <F label="顏色">
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {PALETTE.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:7,background:c,border:`2px solid ${color===c?"#fff":"transparent"}`,cursor:"pointer"}}/>)}
          </div>
        </F>
        <div style={{height:3,background:color,borderRadius:3,marginBottom:14}}/>
        <Btn onClick={ok} style={{width:"100%",justifyContent:"center"}}>{existing?"儲存":"新增科目"}</Btn>
      </Modal>
    );
  }

  function ChapterModal({subjectId}) {
    const [name,setName]=useState("");
    const [selSub,setSelSub]=useState(subjectId||subjects[0]?.id||"");
    const ok=()=>{
      if(!name.trim())return;
      setChapters(p=>[...p,{id:Date.now().toString(),name,subjectId:selSub,completed:false,firstRead:null,reviewCount:0,nextReview:null}]);
      setModal(null);showToast("✦ 章節已新增");
    };
    return(
      <Modal title="新增章節" onClose={()=>setModal(null)}>
        <F label="章節名稱"><Inp value={name} onChange={e=>setName(e.target.value)} placeholder="例：第一章 整數"/></F>
        <F label="歸屬科目"><Sel value={selSub} onChange={e=>setSelSub(e.target.value)}>{subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Sel></F>
        <Btn onClick={ok} style={{width:"100%",justifyContent:"center"}}><Ic n="plus" size={13}/> 新增章節</Btn>
      </Modal>
    );
  }

  function GoalsModal() {
    const [g,setG]=useState({daily:goals.daily,weekly:goals.weekly});
    return(
      <Modal title="設定讀書目標" onClose={()=>setModal(null)}>
        <F label="每日目標（分鐘）"><Inp type="number" value={g.daily} onChange={e=>setG(v=>({...v,daily:+e.target.value}))}/><div style={{fontSize:11,color:"#555",marginTop:3}}>{hhmmLong(g.daily)}</div></F>
        <F label="每週目標（分鐘）"><Inp type="number" value={g.weekly} onChange={e=>setG(v=>({...v,weekly:+e.target.value}))}/><div style={{fontSize:11,color:"#555",marginTop:3}}>{hhmmLong(g.weekly)}</div></F>
        <Btn onClick={()=>{setGoals(g);setModal(null);showToast("✦ 目標已更新");}} style={{width:"100%",justifyContent:"center"}}>儲存目標</Btn>
      </Modal>
    );
  }

  function ExamModal() {
    const [e,setE]=useState({date:exam.date,name:exam.name});
    return(
      <Modal title="設定考試資訊" onClose={()=>setModal(null)}>
        <F label="考試名稱"><Inp value={e.name} onChange={x=>setE(v=>({...v,name:x.target.value}))} placeholder="例：期末考"/></F>
        <F label="考試日期"><Inp type="date" value={e.date} onChange={x=>setE(v=>({...v,date:x.target.value}))}/></F>
        {e.date&&<div style={{background:"#0d0d1a",borderRadius:8,padding:"9px 12px",marginBottom:14,textAlign:"center"}}>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:700,color:"#60a5fa"}}>{diffDays(today,e.date)}</span>
          <span style={{fontSize:12,color:"#666",marginLeft:6}}>天後</span>
        </div>}
        <Btn onClick={()=>{setExam(e);setModal(null);showToast("✦ 考試資訊已更新");}} style={{width:"100%",justifyContent:"center"}}>儲存</Btn>
      </Modal>
    );
  }

  const pages={dashboard:<Dashboard/>,record:<RecordPage/>,stats:<StatsPage/>,subjects:<SubjectsPage/>,chapters:<ChaptersPage/>,review:<ReviewPage/>,behavior:<BehaviorPage/>,guide:<GuidePage/>};

  // ── Bottom nav (mobile-first) ────────────────────────────────────────────────
  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:"#0a0a16"}}>
      {/* Top bar */}
      <div style={{background:"#0d0d1a",borderBottom:"1px solid #111130",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:"#f0a500",fontSize:16,fontWeight:800}}>✦</span>
          <span style={{fontSize:14,fontWeight:800,color:"#eeeeff",letterSpacing:-.3}}>StudyLog</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {timer.on&&(
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:6,height:6,background:"#4ade80",borderRadius:"50%",animation:"pulse 1.5s infinite"}}/>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#4ade80"}}>{padT(timer.elapsed)}</span>
            </div>
          )}
          {user ? (
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {/* Sync button */}
              <button onClick={syncNow} disabled={syncing} title="立即同步" style={{background:"none",border:"none",cursor:syncing?"wait":"pointer",padding:3,lineHeight:0,color:syncStatus==="error"?"#f87171":syncStatus==="ok"?"#4ade80":"#555"}}>
                <svg width={16} height={16} viewBox="0 0 24 24" fill="currentColor" style={{animation:syncing?"spin 1s linear infinite":"none"}}>
                  <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                </svg>
              </button>
              {/* User avatar */}
              <button onClick={()=>setModal("account")} style={{background:"none",border:"none",cursor:"pointer",padding:0,lineHeight:0}}>
                {user.picture
                  ? <img src={user.picture} style={{width:28,height:28,borderRadius:"50%",border:"2px solid #f0a500"}} referrerPolicy="no-referrer"/>
                  : <div style={{width:28,height:28,borderRadius:"50%",background:"#f0a500",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#000"}}>{user.name[0]}</div>
                }
              </button>
            </div>
          ) : (
            <button onClick={signIn} style={{background:"linear-gradient(135deg,#f0a500,#d47800)",border:"none",borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:700,color:"#000",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
              <svg width={13} height={13} viewBox="0 0 24 24" fill="currentColor"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
              Google 登入
            </button>
          )}
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"18px 16px 100px"}}>
        {pages[page]}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0d0d1a",borderTop:"1px solid #111130",display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {nav.map(n=>{
          const active=page===n.id;
          const hasBadge=n.id==="review"&&todayDue.length>0;
          return(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,padding:"10px 4px 8px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",color:active?"#f0a500":"#444",position:"relative",minWidth:0}}>
              <Ic n={n.n} size={20}/>
              <span style={{fontSize:9,fontWeight:active?700:400,letterSpacing:.3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{n.lbl}</span>
              {hasBadge&&<span style={{position:"absolute",top:7,right:"50%",transform:"translateX(8px)",width:7,height:7,background:"#f0a500",borderRadius:"50%",border:"1.5px solid #0d0d1a"}}/>}
            </button>
          );
        })}
      </div>

      {/* Modals */}
      {modal==="addRecord"&&<AddRecordModal/>}
      {modal==="addSubject"&&<SubjectModal/>}
      {modal?.type==="editSubject"&&<SubjectModal existing={modal.subject}/>}
      {modal?.type==="addChapter"&&<ChapterModal subjectId={modal.subjectId}/>}
      {modal==="goals"&&<GoalsModal/>}
      {modal==="exam"&&<ExamModal/>}
      {modal==="account"&&(
        <Modal title="帳號" onClose={()=>setModal(null)}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20,padding:"14px 16px",background:"#0d0d1a",borderRadius:12}}>
            {user?.picture
              ? <img src={user.picture} style={{width:48,height:48,borderRadius:"50%",border:"2px solid #f0a500"}} referrerPolicy="no-referrer"/>
              : <div style={{width:48,height:48,borderRadius:"50%",background:"#f0a500",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,color:"#000"}}>{user && user.name ? user.name[0] : "?"}</div>
            }
            <div>
              <div style={{fontSize:15,fontWeight:700,color:"#eeeeff"}}>{user?.name}</div>
              <div style={{fontSize:12,color:"#666",marginTop:2}}>{user?.email}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"#0d0d1a",borderRadius:10,marginBottom:14}}>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:"#ccc"}}>雲端同步狀態</div>
              <div style={{fontSize:11,color:syncStatus==="ok"?"#4ade80":syncStatus==="error"?"#f87171":"#666",marginTop:2}}>
                {syncing?"同步中…":syncStatus==="ok"?"✦ 已同步":syncStatus==="error"?"同步失敗":"尚未同步"}
              </div>
            </div>
            <Btn sm onClick={()=>{syncNow();setModal(null);}} disabled={syncing}>立即同步</Btn>
          </div>
          <Btn v="danger" onClick={()=>{signOut();setModal(null);}} style={{width:"100%",justifyContent:"center"}}>登出</Btn>
        </Modal>
      )}

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:"#111128",border:"1px solid #2a2a4a",borderRadius:12,padding:"9px 18px",fontSize:12,fontWeight:600,color:toast.color,zIndex:9999,boxShadow:"0 8px 32px rgba(0,0,0,.6)",whiteSpace:"nowrap",animation:"fadeIn .2s ease"}}>
          {toast.msg}
        </div>
      )}

      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      // 偵測到新版本
      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        newWorker.addEventListener("statechange", () => {
          if(newWorker.state === "installed" && navigator.serviceWorker.controller){
            // 有新版本，顯示更新提示
            const banner = document.getElementById("update-banner");
            if(banner) banner.style.display = "flex";
          }
        });
      });
      // 定期檢查更新（每10分鐘）
      setInterval(()=>reg.update(), 10 * 60 * 1000);
    }).catch(()=>{});

    // 更新完成後自動重載
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      window.location.reload();
    });
  });
}
  </script>
</body>
</html>
