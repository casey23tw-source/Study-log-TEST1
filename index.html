<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>StudyLog ✦ 讀書追蹤</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png"/>
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png"/>
  <link rel="shortcut icon" href="icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="StudyLog"/>
  <meta name="theme-color" content="#0a0a16"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0a16;color:#eeeeff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:#0a0a16;}
    ::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:4px;}
    input[type=time]::-webkit-calendar-picker-indicator,
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5) sepia(1) hue-rotate(180deg);}
    select option{background:#111128;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 更新提示横幅 -->
  <div id="update-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#0a0a16;border-bottom:1px solid #f0a500;padding:14px 20px;flex-direction:column;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,.8);">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="color:#f0a500;font-size:18px;">✦</span>
      <div>
        <div style="color:#eeeeff;font-size:14px;font-weight:700;">StudyLog 有新版本！</div>
        <div style="color:#666;font-size:12px;margin-top:2px;">點下方按鈕立即更新，資料不會消失</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="document.getElementById('update-banner').style.display='none'" style="background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:7px 16px;color:#888;font-size:12px;font-weight:600;cursor:pointer;">稍後再說</button>
      <button onclick="updateApp()" style="background:linear-gradient(135deg,#f0a500,#d47800);border:none;border-radius:8px;padding:7px 16px;color:#000;font-size:12px;font-weight:700;cursor:pointer;">✦ 立即更新</button>
    </div>
  </div>

  <script>
    function updateApp(){
      navigator.serviceWorker.getRegistration().then(function(reg){
        if(reg && reg.waiting){
          reg.waiting.postMessage("skipWaiting");
        } else {
          window.location.reload();
        }
      });
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

// ─── Constants ────────────────────────────────────────────────────────────────
const SR_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 120];
const SR_LABELS = ["初次複習","鞏固記憶","短期強化","一週回顧","兩週鞏固","一個月","兩個月","長期維持"];
const STAR = "✦";
const PALETTE = ["#f0a500","#00d4aa","#f472b6","#60a5fa","#fb923c","#34d399","#e879f9","#f87171"];

// ─── Helpers ──────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0,10);
const addDays = (d,n) => { const dt = new Date(d+"T00:00:00"); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); };
const diffDays = (a,b) => Math.round((new Date(b)-new Date(a))/86400000);
const fmtDate = (d) => new Date(d+"T00:00:00").toLocaleDateString("zh-TW",{month:"short",day:"numeric"});
const fmtDateFull = (d) => new Date(d+"T00:00:00").toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"});
const toMins = (t) => { const [h,m]=t.split(":").map(Number); return h*60+m; };
const calcDur = (s,e) => { let d=toMins(e)-toMins(s); if(d<0)d+=1440; return d; };
const hhmm = (m) => { const h=Math.floor(m/60),mn=m%60; return mn===0?`${h}h`:`${h}h ${mn}m`; };
const hhmmLong = (m) => `${Math.floor(m/60)}h ${(m%60).toString().padStart(2,"0")}m`;
const padT = (s) => `${Math.floor(s/3600).toString().padStart(2,"0")}:${Math.floor((s%3600)/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;
const load = (k,d) => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;} };
const save = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
const weekStart = () => { const d=new Date(); d.setDate(d.getDate()-d.getDay()); return d.toISOString().slice(0,10); };

// ─── Icon set ─────────────────────────────────────────────────────────────────
const PATHS = {
  home:"M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z",
  list:"M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z",
  chart:"M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z",
  book:"M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z",
  layers:"M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27-7.38 5.74zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z",
  refresh:"M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z",
  fire:"M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z",
  plus:"M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
  check:"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z",
  close:"M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
  edit:"M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z",
  trash:"M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
  timer:"M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z",
  stop:"M6 6h12v12H6z",
  arrow:"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z",
  trophy:"M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V17H7v2h10v-2h-4v-1.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z",
  calendar:"M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z",
  note:"M19 3H4.99c-1.11 0-1.98.9-1.98 2L3 19c0 1.1.88 2 1.99 2H19c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-6v2h6v2H6v-2h6v-2H6v-2h6v-2H6V9h12v5z",
  help:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z",
};
const Ic = ({n,size=16}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" style={{flexShrink:0}}>
    <path d={PATHS[n]||PATHS.check}/>
  </svg>
);

// ─── Base UI ──────────────────────────────────────────────────────────────────
const IS = {width:"100%",background:"var(--input)",border:"1px solid var(--border)",borderRadius:9,padding:"9px 12px",color:"var(--text)",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
const Inp = (p) => <input style={IS} {...p}/>;
const Sel = ({children,...p}) => <select style={{...IS,cursor:"pointer"}} {...p}>{children}</select>;
const Tex = (p) => <textarea style={{...IS,resize:"vertical",minHeight:72}} {...p}/>;
const Lbl = ({c}) => <div style={{color:"var(--sub)",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>{c}</div>;
const F = ({label,children,half}) => <div style={{marginBottom:14,flex:half?"1":undefined}}>{label&&<Lbl c={label}/>}{children}</div>;

const Btn = ({children,onClick,v="primary",sm,style:sx,disabled}) => {
  const base = {border:"none",borderRadius:9,cursor:disabled?"not-allowed":"pointer",fontWeight:600,display:"inline-flex",alignItems:"center",gap:6,transition:"opacity 0.15s",opacity:disabled?.45:1,fontFamily:"inherit",letterSpacing:.2};
  const vs = {
    primary:{background:"linear-gradient(135deg,#f0a500,#d47800)",color:"#000",padding:sm?"5px 13px":"9px 18px",fontSize:sm?12:13},
    ghost:{background:"transparent",color:"#666",padding:sm?"4px 10px":"8px 14px",fontSize:sm?12:13,border:"1px solid #222240"},
    danger:{background:"#1e0a0a",color:"#f87171",padding:sm?"5px 13px":"9px 18px",fontSize:sm?12:13,border:"1px solid #3a1a1a"},
    teal:{background:"linear-gradient(135deg,#00d4aa,#009e7a)",color:"#000",padding:sm?"5px 13px":"9px 18px",fontSize:sm?12:13},
    dim:{background:"var(--input, #16162e)",color:"var(--sub, #aaa)",padding:sm?"5px 13px":"9px 18px",fontSize:sm?12:13,border:"1px solid #222240"},
  };
  return <button style={{...base,...vs[v],...sx}} onClick={onClick} disabled={disabled}
    onMouseEnter={e=>{if(!disabled)e.currentTarget.style.opacity=".75"}}
    onMouseLeave={e=>e.currentTarget.style.opacity="1"}>{children}</button>;
};

const Card = ({children,style:sx,glow}) => (
  <div style={{background:"var(--card)",border:`1px solid ${glow||"var(--border)"}`,borderRadius:14,padding:20,...sx}}>
    {children}
  </div>
);

const Tag = ({children,color="#60a5fa",bg="var(--tagBg, #0d1520)"}) => (
  <span style={{fontSize:10,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",color,background:bg,padding:"2px 7px",borderRadius:20,whiteSpace:"nowrap"}}>{children}</span>
);

const Modal = ({title,onClose,children}) => (
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <div style={{background:"var(--modal)",border:"1px solid var(--border)",borderRadius:18,padding:24,width:"100%",maxWidth:440,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontSize:16,fontWeight:700,color:"var(--text)",letterSpacing:.3}}>{STAR} {title}</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"var(--sub)",cursor:"pointer",padding:4,lineHeight:0}}><Ic n="close" size={18}/></button>
      </div>
      {children}
    </div>
  </div>
);

const Ring = ({pct,size=80,stroke=6,color="#f0a500",label,sub}) => {
  const r=(size-stroke)/2, circ=2*Math.PI*r, off=circ-(Math.min(pct,100)/100)*circ;
  return (
    <div style={{position:"relative",width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--barBg, #1a1a2e)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:"stroke-dashoffset .6s ease"}}/>
      </svg>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:size/5.5,fontWeight:700,color,fontFamily:"'DM Mono',monospace"}}>{Math.round(pct)}%</div>
        {label&&<div style={{fontSize:size/8.5,color:C.sub,marginTop:1}}>{label}</div>}
        {sub&&<div style={{fontSize:size/9,color:C.dim}}>{sub}</div>}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState("dashboard");
  const [records, setRecords] = useState(() => load("st2_records", []));
  const [subjects, setSubjects] = useState(() => load("st2_subjects", [
    {id:"1",name:"數學",color:"#f0a500"},{id:"2",name:"英文",color:"#00d4aa"}
  ]));
  const [chapters, setChapters] = useState(() => load("st2_chapters", []));
  const [goals, setGoals] = useState(() => load("st2_goals", {daily:120,weekly:840}));
  const [exam, setExam] = useState(() => load("st2_exam", {date:"",name:""}));
  const [modal, setModal] = useState(null);
  const [timer, setTimer] = useState({on:false,paused:false,start:null,pausedAt:0,subId:"",elapsed:0});
  const [toast, setToast] = useState(null);
  const [theme, setTheme] = useState(()=>load("st2_theme","dark"));
  const timerRef = useRef(null);
  const today = todayStr();

  useEffect(()=>{save("st2_records",records);},[records]);
  useEffect(()=>{save("st2_subjects",subjects);},[subjects]);
  useEffect(()=>{save("st2_chapters",chapters);},[chapters]);
  useEffect(()=>{save("st2_goals",goals);},[goals]);
  useEffect(()=>{save("st2_exam",exam);},[exam]);
  useEffect(()=>{save("st2_theme",theme);},[theme]);

  // Theme colors — defined BEFORE useEffect so it's available immediately
  const C = theme==="light" ? {
    bg:"#f5f5f0",card:"#ffffff",border:"#d0d0da",text:"#111122",sub:"#555",dim:"#999",input:"#ebebea",nav:"#ffffff",modal:"#ffffff",modalInner:"#f0f0ea",
    cardText:"#111122",subText:"#444",dimText:"#888",barBg:"#d8d8e0",tagBg:"#e0e0e8",
  } : {
    bg:"#0a0a16",card:"#111128",border:"#1e1e3a",text:"#eeeeff",sub:"#888",dim:"#555",input:"#1e1e36",nav:"#0d0d1a",modal:"#111128",modalInner:"#1e1e36",
    cardText:"#eeeeff",subText:"#aaa",dimText:"#666",barBg:"#1a1a2e",tagBg:"#0d1520",
  };

  useEffect(()=>{
    const root = document.documentElement;
    root.style.setProperty("--bg", C.bg);
    root.style.setProperty("--card", C.card);
    root.style.setProperty("--border", C.border);
    root.style.setProperty("--text", C.text);
    root.style.setProperty("--sub", C.sub);
    root.style.setProperty("--dim", C.dim);
    root.style.setProperty("--input", C.input);
    root.style.setProperty("--nav", C.nav);
    root.style.setProperty("--modal", C.modal);
    root.style.setProperty("--modalInner", C.modalInner);
    root.style.setProperty("--barBg", C.barBg);
    root.style.setProperty("--tagBg", C.tagBg);
    document.body.style.background = C.bg;
  },[theme]);

  useEffect(()=>{
    if(timer.on && !timer.paused){
      timerRef.current=setInterval(()=>setTimer(t=>({...t,elapsed:t.pausedAt+Math.floor((Date.now()-t.start)/1000)})),1000);
    } else {
      clearInterval(timerRef.current);
    }
    return ()=>clearInterval(timerRef.current);
  },[timer.on, timer.paused]);

  const showToast = (msg,color="#4ade80") => { setToast({msg,color}); setTimeout(()=>setToast(null),2200); };
  const addRecord = (r) => setRecords(p=>[{id:Date.now().toString(),...r},...p]);
  const delRecord = (id) => setRecords(p=>p.filter(r=>r.id!==id));
  const startTimer = (subId) => setTimer({on:true,paused:false,start:Date.now(),pausedAt:0,subId,elapsed:0});
  const pauseTimer = () => {
    if(timer.paused){
      // Resume
      setTimer(t=>({...t,paused:false,start:Date.now(),pausedAt:t.elapsed}));
    } else {
      // Pause
      setTimer(t=>({...t,paused:true}));
    }
  };
  const stopTimer = () => {
    const mins=Math.round(timer.elapsed/60);
    if(mins>0&&timer.subId){
      const now=new Date();
      const stMs = timer.start - timer.pausedAt*1000;
      const st=new Date(now.getTime()-timer.elapsed*1000);
      const f2=(d)=>d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
      addRecord({date:today,startTime:f2(st),endTime:f2(now),subjectId:timer.subId,duration:mins,note:"計時模式",type:"new"});
      showToast(`✦ 已儲存 ${hhmm(mins)}`);
    }
    setTimer({on:false,paused:false,start:null,pausedAt:0,subId:"",elapsed:0});
  };

  // Notifications
  const requestNotifPerm = () => {
    if(!("Notification" in window)) return;
    Notification.requestPermission();
  };
  const sendNotif = (title, body) => {
    if(Notification.permission==="granted"){
      new Notification(title, {body, icon:"icon-192.png"});
    }
  };

  // Export / Import
  const exportData = () => {
    const data = {records,subjects,chapters,goals,exam,exportedAt:new Date().toISOString()};
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`studylog-backup-${today}.json`; a.click();
    URL.revokeObjectURL(url);
    showToast("✦ 資料已匯出");
  };
  const importData = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if(data.records) setRecords(data.records);
        if(data.subjects) setSubjects(data.subjects);
        if(data.chapters) setChapters(data.chapters);
        if(data.goals) setGoals(data.goals);
        if(data.exam) setExam(data.exam);
        showToast("✦ 資料已匯入");
        setModal(null);
      } catch { showToast("匯入失敗，請確認檔案格式","#f87171"); }
    };
    reader.readAsText(file);
  };

  const todayMins=records.filter(r=>r.date===today).reduce((s,r)=>s+r.duration,0);
  const wkStart=weekStart();
  const weekMins=records.filter(r=>r.date>=wkStart).reduce((s,r)=>s+r.duration,0);
  const monthMins=records.filter(r=>r.date.startsWith(today.slice(0,7))).reduce((s,r)=>s+r.duration,0);
  const totalMins=records.reduce((s,r)=>s+r.duration,0);
  const subMins=subjects.map(s=>({...s,mins:records.filter(r=>r.subjectId===s.id).reduce((a,r)=>a+r.duration,0)})).sort((a,b)=>b.mins-a.mins);
  const examDays=exam.date?diffDays(today,exam.date):null;
  const todayDue=chapters.filter(c=>c.nextReview&&c.nextReview<=today&&c.completed);
  const streakDays=(()=>{
    const days=[...new Set(records.map(r=>r.date))].sort().reverse();
    let s=0,cur=today;
    for(const d of days){if(d===cur){s++;cur=addDays(cur,-1);}else if(d<cur)break;}
    return s;
  })();

  const completeReview=(cid)=>{
    setChapters(p=>p.map(c=>{
      if(c.id!==cid)return c;
      const next=c.reviewCount+1;
      return{...c,reviewCount:next,lastReview:today,nextReview:addDays(today,SR_INTERVALS[Math.min(next,SR_INTERVALS.length-1)])};
    }));
    showToast("✦ 複習完成！");
  };
  const markRead=(cid)=>{
    setChapters(p=>p.map(c=>{
      if(c.id!==cid||c.completed)return c;
      return{...c,completed:true,firstRead:today,reviewCount:0,nextReview:addDays(today,SR_INTERVALS[0])};
    }));
    showToast("✦ 章節完成，已排入複習！");
  };

  const nav=[
    {id:"dashboard",n:"home",lbl:"儀表板"},
    {id:"record",n:"list",lbl:"紀錄"},
    {id:"stats",n:"chart",lbl:"統計"},
    {id:"subjects",n:"book",lbl:"科目"},
    {id:"chapters",n:"layers",lbl:"章節"},
    {id:"review",n:"refresh",lbl:"複習"},
    {id:"behavior",n:"trophy",lbl:"成就"},
    {id:"guide",n:"help",lbl:"使用手冊"},
  ];

              )}
            </Card>
          ))}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

                  </div>

        {exam.date&&(
          <Card glow="#1a2a3a">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

  // ── Records ──────────────────────────────────────────────────────────────────
  function RecordPage() {
    const [filter,setFilter]=useState("all");
    const [typeF,setTypeF]=useState("all");
    const [search,setSearch]=useState("");
    const grouped=(()=>{
      let src=filter==="all"?records:records.filter(r=>r.subjectId===filter);
      if(typeF!=="all")src=src.filter(r=>r.type===typeF);
      if(search.trim()){
        const q=search.toLowerCase();
        src=src.filter(r=>{
          const sub=subjects.find(s=>s.id===r.subjectId);
          return (sub?.name||"").toLowerCase().includes(q)||(r.note||"").toLowerCase().includes(q)||r.date.includes(q);
        });
      }
      const map={};
      src.forEach(r=>{if(!map[r.date])map[r.date]=[];map[r.date].push(r);});
      return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
    })();
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text}}>{STAR} 讀書紀錄</div>
          <Btn sm onClick={()=>setModal("addRecord")}><Ic n="plus" size={13}/> 新增</Btn>
        </div>
        {/* Search */}
        <div style={{position:"relative",marginBottom:10}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋科目、備註、日期…" style={{...{width:"100%",background:C.input,border:`1px solid ${C.border}`,borderRadius:9,padding:"9px 12px 9px 36px",color:C.text,fontSize:13,outline:"none",boxSizing:"border-box"}}}/>
          <svg width={14} height={14} viewBox="0 0 24 24" fill={C.sub} style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.sub,cursor:"pointer",padding:0,lineHeight:0}}><Ic n="close" size={14}/></button>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          <Sel value={filter} onChange={e=>setFilter(e.target.value)} style={{flex:1,minWidth:100,background:C.input,color:C.text,border:`1px solid ${C.border}`}}>
            <option value="all">全部科目</option>
            {subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </Sel>
          <Sel value={typeF} onChange={e=>setTypeF(e.target.value)} style={{width:100,background:C.input,color:C.text,border:`1px solid ${C.border}`}}>
            <option value="all">全部類型</option>
            <option value="new">新學習</option>
            <option value="review">複習</option>
          </Sel>
        </div>
        {grouped.length===0&&<div style={{color:"#333",textAlign:"center",padding:48,fontSize:13}}>尚無紀錄</div>}
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          {grouped.map(([date,recs])=>{
            const dayMins=recs.reduce((s,r)=>s+r.duration,0);
            return(
              <div key={date}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,padding:"0 2px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.sub}}>{fmtDate(date)}{date===today?" · 今天":""}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:C.dim}}>{hhmm(dayMins)}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {recs.map(r=>{
                    const sub=subjects.find(s=>s.id===r.subjectId);
                    return(
                      <div key={r.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:`3px solid ${sub?.color||"#444"}`}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2,flexWrap:"wrap"}}>
                            <span style={{fontSize:12,fontWeight:700,color:sub?.color||"#888"}}>{sub?.name||"未知"}</span>
                            <Tag color={r.type==="review"?"#60a5fa":"#f0a500"} bg={r.type==="review"?`${C.card}`:C.card}>{r.type==="review"?"複習":"新學習"}</Tag>
                          </div>
                          <div style={{fontSize:11,color:C.dim}}>{r.startTime}–{r.endTime}{r.note&&r.note!=="計時模式"?` · ${r.note}`:""}</div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                          <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:C.text}}>{hhmm(r.duration)}</span>
                          <button onClick={()=>delRecord(r.id)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",padding:2,lineHeight:0}}
                            onMouseEnter={e=>e.currentTarget.style.color="#f87171"}
                            onMouseLeave={e=>e.currentTarget.style.color="#333"}><Ic n="trash" size={13}/></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>

              <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.sub}}><div style={{width:8,height:8,borderRadius:"50%",background:"#4ade80"}}/>有複習</div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,textAlign:"center"}}>
              {(()=>{
                const lastRec = records.length>0 ? records[records.length-1] : null;
                const firstDate = lastRec ? lastRec.date : today;
                const dayCount = Math.max(diffDays(firstDate, today)+1, 1);
                const avgDaily = totalMins>0 ? Math.round(totalMins/dayCount) : 0;
                const predicted = avgDaily>0 ? Math.round((totalMins+avgDaily*examDays)/60) : 0;
                return [
                  {lbl:"距今天數",v:`${examDays}天`,c:"#60a5fa"},
                  {lbl:"日均讀書",v:avgDaily>0?hhmm(avgDaily):"—",c:"#60a5fa"},
                  {lbl:"預估累積",v:predicted>0?`${predicted}h`:"—",c:"#4ade80"},
                ].map(x=>(
                  <div key={x.lbl} style={{background:C.input,borderRadius:9,padding:10}}>
                    <div style={{fontSize:16,fontWeight:800,fontFamily:"'DM Mono',monospace",color:x.c}}>{x.v}</div>
                    <div style={{fontSize:10,color:C.sub,marginTop:3}}>{x.lbl}</div>
                  </div>
                ));
              })()}
            </div>
          </Card>
        )}
      </div>
    );
  }

                    <span style={{fontSize:11,color:C.sub}}>{chaps.length} 章節 · <span style={{color:"#4ade80"}}>{done}</span> 完成</span>

                  <Btn v="danger" sm onClick={()=>{if(confirm("確定刪除此科目？"))setSubjects(p=>p.filter(x=>x.id!==s.id));}}><Ic n="trash" size={11}/></Btn>

  // ── Chapters ─────────────────────────────────────────────────────────────────
  function ChaptersPage() {
    const [sel,setSel]=useState(subjects[0]?.id||"");
    const [sort,setSort]=useState("default"); // "default"|"name"|"review"|"pending"
    const sub=subjects.find(s=>s.id===sel);
    const chaps=(()=>{
      let src=chapters.filter(c=>c.subjectId===sel);
      if(sort==="name") src=[...src].sort((a,b)=>a.name.localeCompare(b.name,"zh"));
      else if(sort==="review") src=[...src].sort((a,b)=>(a.nextReview||"9999").localeCompare(b.nextReview||"9999"));
      else if(sort==="pending") src=[...src].sort((a,b)=>(a.completed?1:0)-(b.completed?1:0));
      return src;
    })();
    const done=chaps.filter(c=>c.completed).length;
    return(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text}}>{STAR} 章節追蹤</div>
          <div style={{display:"flex",gap:6}}>
            <Sel value={sort} onChange={e=>setSort(e.target.value)} style={{width:90,fontSize:11,padding:"4px 8px",background:C.input,color:C.text,border:`1px solid ${C.border}`}}>
              <option value="default">預設</option>
              <option value="name">名稱</option>
              <option value="review">複習日</option>
              <option value="pending">待完成</option>
            </Sel>
            <Btn sm onClick={()=>setModal({type:"addChapter",subjectId:sel})} disabled={!sel}><Ic n="plus" size={13}/> 新增</Btn>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {subjects.map(s=>{
            const active=s.id===sel;
            const cnt=chapters.filter(c=>c.subjectId===s.id&&c.nextReview&&c.nextReview<=today&&c.completed).length;
            return(
              <button key={s.id} onClick={()=>setSel(s.id)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${active?s.color:"#222240"}`,background:active?`${s.color}22`:"transparent",color:active?s.color:"#555",fontSize:12,fontWeight:active?700:400,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                {s.name}{cnt>0&&<span style={{background:s.color,color:"#000",borderRadius:8,padding:"0 4px",fontSize:9,fontWeight:800}}>{cnt}</span>}
              </button>
            );
          })}
        </div>
        {chaps.length>0&&(
          <Card style={{padding:"11px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:11,color:C.sub}}>完成進度</span>
              <span style={{fontSize:11,color:C.sub,fontFamily:"'DM Mono',monospace"}}>{done}/{chaps.length}</span>
            </div>
            <div style={{height:4,background:C.barBg,borderRadius:4}}>
              <div style={{height:"100%",width:`${chaps.length>0?(done/chaps.length)*100:0}%`,background:sub?.color||"#f0a500",borderRadius:4}}/>
            </div>
          </Card>
        )}
        {chaps.length===0&&<div style={{color:"#333",textAlign:"center",padding:48,fontSize:13}}>尚無章節，點右上角新增</div>}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {chaps.map(c=>{
            const overdue=c.nextReview&&c.nextReview<=today&&c.completed;
            return(
              <div key={c.id} style={{background:C.card,border:`1px solid ${overdue?"#5a3a0a":C.border}`,borderRadius:10,padding:"11px 13px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                      <span style={{width:6,height:6,borderRadius:"50%",background:c.completed?"#4ade80":"#333",flexShrink:0}}/>
                      <span style={{fontSize:12,fontWeight:600,color:c.completed?C.text:C.sub}}>{c.name}</span>
                      {overdue&&<Tag color="#f0a500" bg={C.input}>{STAR} 今日複習</Tag>}
                    </div>
                    {c.completed?(
                      <div style={{fontSize:11,color:"#444",display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                        <Tag color="#60a5fa">{SR_LABELS[Math.min(c.reviewCount,SR_LABELS.length-1)]}</Tag>
                        <span>首讀 {c.firstRead}</span>
                        <span>複習 {c.reviewCount} 次</span>
                        {c.nextReview&&<span style={{color:overdue?"#f0a500":"#444"}}>下次 {c.nextReview}</span>}
                      </div>
                    ):<div style={{fontSize:11,color:"#333"}}>未完成閱讀</div>}
                  </div>
                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    {!c.completed&&<Btn v="dim" sm onClick={()=>markRead(c.id)}><Ic n="check" size={10}/> 完成</Btn>}
                    <button onClick={()=>setChapters(p=>p.filter(x=>x.id!==c.id))} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",padding:2,lineHeight:0}}
                      onMouseEnter={e=>e.currentTarget.style.color="#f87171"}
                      onMouseLeave={e=>e.currentTarget.style.color="#333"}><Ic n="trash" size={12}/></button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Review ───────────────────────────────────────────────────────────────────
  function ReviewPage() {
    const all=chapters.filter(c=>c.completed&&c.nextReview).sort((a,b)=>a.nextReview.localeCompare(b.nextReview));
    const due=all.filter(c=>c.nextReview<=today);
    const soon=all.filter(c=>c.nextReview>today&&diffDays(today,c.nextReview)<=7);
    const later=all.filter(c=>c.nextReview>today&&diffDays(today,c.nextReview)>7);
    const Row=({c,isDue})=>{
      const sub=subjects.find(s=>s.id===c.subjectId);
      const d=diffDays(today,c.nextReview);
      return(
        <div style={{background:C.card,border:`1px solid ${isDue?"#5a3a0a":C.border}`,borderRadius:10,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2,flexWrap:"wrap"}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:sub?.color||"#888",flexShrink:0}}/>
              <span style={{fontSize:12,fontWeight:600,color:C.text}}>{c.name}</span>
              <span style={{fontSize:10,color:sub?.color||"#888"}}>{sub?.name}</span>
              <Tag color="#60a5fa">{SR_LABELS[Math.min(c.reviewCount,SR_LABELS.length-1)]}</Tag>
            </div>
            <div style={{fontSize:10,color:C.dim}}>
              第 {c.reviewCount+1} 次 · {isDue?"今日到期":d===1?"明天":`${d+1}天後`} · 下次間隔 {SR_INTERVALS[Math.min(c.reviewCount+1,SR_INTERVALS.length-1)]} 天
            </div>
          </div>
          {isDue&&<Btn v="teal" sm onClick={()=>{completeReview(c.id);addRecord({date:today,startTime:"--:--",endTime:"--:--",subjectId:c.subjectId,duration:30,note:`複習：${c.name}`,type:"review"});}}><Ic n="check" size={10}/> 完成</Btn>}
        </div>
      );
    };
    return(
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:18,fontWeight:800,color:C.text}}>{STAR} 複習排程</div>
        <Card style={{padding:"13px 16px"}}>
          <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>記憶曲線間隔</div>
          <div style={{display:"flex",gap:2}}>
            {SR_INTERVALS.map((d,i)=>(
              <div key={i} style={{flex:1,textAlign:"center"}}>
                <div style={{height:3,background:`hsl(${220-i*20},70%,${35+i*5}%)`,borderRadius:2,marginBottom:3}}/>
                <div style={{fontSize:8,color:C.dim}}>{d}天</div>
              </div>
            ))}
          </div>
        </Card>
        {due.length>0&&<div>
          <div style={{fontSize:12,fontWeight:700,color:"#f0a500",marginBottom:6}}>{STAR} 今日應複習 ({due.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>{due.map(c=><Row key={c.id} c={c} isDue/>)}</div>
        </div>}
        {soon.length>0&&<div>
          <div style={{fontSize:12,fontWeight:700,color:"#60a5fa",marginBottom:6,marginTop:4}}>本週即將複習 ({soon.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>{soon.map(c=><Row key={c.id} c={c} isDue={false}/>)}</div>
        </div>}
        {later.length>0&&<div>
          <div style={{fontSize:12,fontWeight:700,color:"#444",marginBottom:6,marginTop:4}}>未來排程</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>{later.slice(0,8).map(c=><Row key={c.id} c={c} isDue={false}/>)}</div>
        </div>}
        {all.length===0&&<div style={{color:"#333",textAlign:"center",padding:48,fontSize:13}}>完成章節後系統自動排入複習</div>}
      </div>
    );
  }

  // ── Behavior ─────────────────────────────────────────────────────────────────
  function BehaviorPage() {
    const uniqDays=[...new Set(records.map(r=>r.date))];
    const bestDay=uniqDays.map(d=>({d,m:records.filter(r=>r.date===d).reduce((s,r)=>s+r.duration,0)})).sort((a,b)=>b.m-a.m)[0];
    const heatDays=Array.from({length:70},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(69-i));return d.toISOString().slice(0,10);});
    const heatMax=Math.max(...heatDays.map(d=>records.filter(r=>r.date===d).reduce((s,r)=>s+r.duration,0)),1);
    return(
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:18,fontWeight:800,color:C.text}}>{STAR} 成就總覽</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[
            {lbl:"連續天數",v:streakDays,unit:"天",color:"#f0a500"},
            {lbl:"讀書日數",v:uniqDays.length,unit:"天",color:"#00d4aa"},
            {lbl:"總讀書",v:`${Math.floor(totalMins/60)}`,unit:"小時",color:"#60a5fa"},
          ].map(x=>(
            <Card key={x.lbl} style={{textAlign:"center",padding:"14px 10px"}}>
              <div style={{fontSize:9,color:C.sub,letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>{x.lbl}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:26,fontWeight:800,color:x.color,lineHeight:1}}>{x.v}</div>
              <div style={{fontSize:10,color:"#555",marginTop:3}}>{x.unit}</div>
            </Card>
          ))}
        </div>
        <Card>
          <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>讀書熱度圖 (近10週) {STAR}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:2}}>
            {Array.from({length:10},(_,week)=>(
              <div key={week} style={{display:"flex",flexDirection:"column",gap:2}}>
                {Array.from({length:7},(_,dow)=>{
                  const d=heatDays[week*7+dow];
                  if(!d)return<div key={dow} style={{height:11,borderRadius:2}}/>;
                  const m=records.filter(r=>r.date===d).reduce((s,r)=>s+r.duration,0);
                  const intensity=m/heatMax;
                  const bg=m===0?(theme==="light"?"#d8d8d0":"#111"):`hsl(43,${40+intensity*60}%,${15+intensity*35}%)`;
                  return<div key={dow} title={`${fmtDate(d)}: ${hhmm(m)}`} style={{height:11,borderRadius:2,background:bg}}/>;
                })}
              </div>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:3,alignItems:"center",marginTop:7}}>
            <span style={{fontSize:9,color:C.dim}}>少</span>
            {[0,.25,.5,.75,1].map(i=><div key={i} style={{width:9,height:9,borderRadius:2,background:i===0?(theme==="light"?"#d8d8d0":"#111"):`hsl(43,${40+i*60}%,${15+i*35}%)`}}/>)}
            <span style={{fontSize:9,color:C.dim}}>多</span>
          </div>
        </Card>
        <Card>
          <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>科目排行 {STAR}</div>
          {subMins.map((s,i)=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:18,height:18,borderRadius:4,background:i<3?["#f0a500","#aaa","#cd7f32"][i]:C.barBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:i<3?"#000":"#444",flexShrink:0}}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,color:s.color,fontWeight:600}}>{s.name}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:C.sub}}>{hhmmLong(s.mins)}</span>
                </div>
                <div style={{height:3,background:C.barBg,borderRadius:3}}>
                  <div style={{height:"100%",width:`${(s.mins/Math.max(subMins[0]?.mins,1))*100}%`,background:s.color,borderRadius:3}}/>
                </div>
              </div>
            </div>
          ))}
        </Card>
        {bestDay&&(
          <Card style={{padding:"13px 16px"}}>
            <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>最佳單日 {STAR}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:13,color:C.sub}}>{fmtDateFull(bestDay.d)}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:800,color:"#f472b6"}}>{hhmmLong(bestDay.m)}</div>
            </div>
          </Card>
        )}
      </div>
    );
  }

  // ── Modals ───────────────────────────────────────────────────────────────────
  function AddRecordModal() {
    const [f,setF]=useState({date:today,startTime:"09:00",endTime:"10:00",subjectId:subjects[0]?.id||"",note:"",type:"new"});
    const dur=calcDur(f.startTime,f.endTime);
    const s=k=>e=>setF(v=>({...v,[k]:e.target.value}));
    const ok=()=>{ if(dur>0&&f.subjectId){addRecord({...f,duration:dur});showToast(`✦ 已新增 ${hhmm(dur)}`);setModal(null);} };
    return(
      <Modal title="新增讀書紀錄" onClose={()=>setModal(null)}>
        <F label="日期"><Inp type="date" value={f.date} onChange={s("date")}/></F>
        <div style={{display:"flex",gap:10}}>
          <F label="開始" half><Inp type="time" value={f.startTime} onChange={s("startTime")}/></F>
          <F label="結束" half><Inp type="time" value={f.endTime} onChange={s("endTime")}/></F>
        </div>
        <div style={{background:"var(--modalInner)",borderRadius:8,padding:"8px 12px",marginBottom:14,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:11,color:C.sub}}>時長</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:"#f0a500"}}>{hhmmLong(dur)}</span>
        </div>
        <div style={{display:"flex",gap:10}}>
          <F label="科目" half><Sel value={f.subjectId} onChange={s("subjectId")}>{subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Sel></F>
          <F label="類型" half><Sel value={f.type} onChange={s("type")}><option value="new">新學習</option><option value="review">複習</option></Sel></F>
        </div>
        <F label="備註（可選）"><Tex value={f.note} onChange={s("note")} placeholder="備註…"/></F>
        <Btn onClick={ok} style={{width:"100%",justifyContent:"center"}}><Ic n="check" size={13}/> 儲存紀錄</Btn>
      </Modal>
    );
  }

  function SubjectModal({existing}) {
    const [name,setName]=useState(existing?.name||"");
    const [color,setColor]=useState(existing?.color||PALETTE[subjects.length%PALETTE.length]);
    const ok=()=>{
      if(!name.trim())return;
      if(existing)setSubjects(p=>p.map(s=>s.id===existing.id?{...s,name,color}:s));
      else setSubjects(p=>[...p,{id:Date.now().toString(),name,color}]);
      setModal(null);showToast(`✦ ${existing?"已更新":"已新增"} ${name}`);
    };
    return(
      <Modal title={existing?"編輯科目":"新增科目"} onClose={()=>setModal(null)}>
        <F label="名稱"><Inp value={name} onChange={e=>setName(e.target.value)} placeholder="例：數學"/></F>
        <F label="顏色">
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {PALETTE.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:7,background:c,border:`2px solid ${color===c?"#fff":"transparent"}`,cursor:"pointer"}}/>)}
          </div>
        </F>
        <div style={{height:3,background:color,borderRadius:3,marginBottom:14}}/>
        <Btn onClick={ok} style={{width:"100%",justifyContent:"center"}}>{existing?"儲存":"新增科目"}</Btn>
      </Modal>
    );
  }

  function ChapterModal({subjectId}) {
    const [name,setName]=useState("");
    const [selSub,setSelSub]=useState(subjectId||subjects[0]?.id||"");
    const ok=()=>{
      if(!name.trim())return;
      setChapters(p=>[...p,{id:Date.now().toString(),name,subjectId:selSub,completed:false,firstRead:null,reviewCount:0,nextReview:null}]);
      setModal(null);showToast("✦ 章節已新增");
    };
    return(
      <Modal title="新增章節" onClose={()=>setModal(null)}>
        <F label="章節名稱"><Inp value={name} onChange={e=>setName(e.target.value)} placeholder="例：第一章 整數"/></F>
        <F label="歸屬科目"><Sel value={selSub} onChange={e=>setSelSub(e.target.value)}>{subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Sel></F>
        <Btn onClick={ok} style={{width:"100%",justifyContent:"center"}}><Ic n="plus" size={13}/> 新增章節</Btn>
      </Modal>
    );
  }

  function GoalsModal() {
    const [g,setG]=useState({daily:goals.daily,weekly:goals.weekly});
    return(
      <Modal title="設定讀書目標" onClose={()=>setModal(null)}>
        <F label="每日目標（分鐘）"><Inp type="number" value={g.daily} onChange={e=>setG(v=>({...v,daily:+e.target.value}))}/><div style={{fontSize:11,color:"#aaa",marginTop:3,color:C.sub}}>{hhmmLong(g.daily)}</div></F>
        <F label="每週目標（分鐘）"><Inp type="number" value={g.weekly} onChange={e=>setG(v=>({...v,weekly:+e.target.value}))}/><div style={{fontSize:11,color:"#aaa",marginTop:3,color:C.sub}}>{hhmmLong(g.weekly)}</div></F>
        <Btn onClick={()=>{setGoals(g);setModal(null);showToast("✦ 目標已更新");}} style={{width:"100%",justifyContent:"center"}}>儲存目標</Btn>
      </Modal>
    );
  }

  function ExamModal() {
    const [e,setE]=useState({date:exam.date,name:exam.name});
    return(
      <Modal title="設定考試資訊" onClose={()=>setModal(null)}>
        <F label="考試名稱"><Inp value={e.name} onChange={x=>setE(v=>({...v,name:x.target.value}))} placeholder="例：期末考"/></F>
        <F label="考試日期"><Inp type="date" value={e.date} onChange={x=>setE(v=>({...v,date:x.target.value}))}/></F>
        {e.date&&<div style={{background:"var(--modalInner)",borderRadius:8,padding:"9px 12px",marginBottom:14,textAlign:"center"}}>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:700,color:"#60a5fa"}}>{diffDays(today,e.date)}</span>
          <span style={{fontSize:12,color:C.sub,marginLeft:6}}>天後</span>
        </div>}
        <Btn onClick={()=>{setExam(e);setModal(null);showToast("✦ 考試資訊已更新");}} style={{width:"100%",justifyContent:"center"}}>儲存</Btn>
      </Modal>
    );
  }

  function SettingsModal() {
    const fileRef = useRef(null);
    const [checking, setChecking] = useState(false);
    const [updateMsg, setUpdateMsg] = useState(null);

    const checkUpdate = () => {
      setChecking(true);
      setUpdateMsg(null);
      window.checkForUpdate((status) => {
        setChecking(false);
        if(status==="available") setUpdateMsg({ok:true, text:"✦ 有新版本！請點上方橫幅更新"});
        else if(status==="latest") setUpdateMsg({ok:true, text:"✦ 已是最新版本"});
        else if(status==="no-sw") setUpdateMsg({ok:false, text:"無法檢查（請重新整理後再試）"});
        else setUpdateMsg({ok:false, text:"檢查失敗，請確認網路連線"});
      });
    };
    return(
      <Modal title="設定" onClose={()=>setModal(null)}>
        {/* Update */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>應用程式更新</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:C.input,borderRadius:10}}>
            <div>
              <div style={{fontSize:13,color:C.text,fontWeight:600}}>檢查新版本</div>
              {updateMsg&&<div style={{fontSize:11,color:updateMsg.ok?"#4ade80":"#f87171",marginTop:3}}>{updateMsg.text}</div>}
            </div>
            <Btn sm onClick={checkUpdate} disabled={checking}>{checking?"檢查中…":"檢查更新"}</Btn>
          </div>
        </div>

        {/* Theme */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>外觀</div>
          <div style={{display:"flex",gap:8}}>
            {["dark","light"].map(t=>(
              <button key={t} onClick={()=>setTheme(t)} style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${theme===t?"#f0a500":C.border}`,background:theme===t?"#f0a50022":C.input,color:theme===t?"#f0a500":C.sub,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                {t==="dark"?"🌙 深色":"☀️ 淺色"}
              </button>
            ))}
          </div>
        </div>

        {/* Notifications */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>通知</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:C.input,borderRadius:10}}>
            <div>
              <div style={{fontSize:13,color:C.text,fontWeight:600}}>複習提醒</div>
              <div style={{fontSize:11,color:C.sub,marginTop:2}}>
                {typeof Notification!=="undefined"?
                  Notification.permission==="granted"?"✦ 已開啟通知":"點右邊開啟":
                  "此裝置不支援通知"}
              </div>
            </div>
            {typeof Notification!=="undefined"&&Notification.permission!=="granted"&&(
              <Btn sm onClick={requestNotifPerm}>開啟</Btn>
            )}
          </div>
        </div>

        {/* Export / Import */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>資料備份</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <Btn onClick={exportData} style={{width:"100%",justifyContent:"center"}}>
              <svg width={14} height={14} viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
              匯出資料（備份）
            </Btn>
            <input ref={fileRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
            <Btn v="ghost" onClick={()=>fileRef.current?.click()} style={{width:"100%",justifyContent:"center"}}>
              <svg width={14} height={14} viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
              匯入資料（還原）
            </Btn>
          </div>
          <div style={{fontSize:11,color:C.sub,marginTop:8,lineHeight:1.5}}>匯入時會覆蓋目前所有資料，建議先匯出備份。</div>
        </div>
      </Modal>
    );
  }

  const pages={dashboard:<Dashboard/>,record:<RecordPage/>,stats:<StatsPage/>,subjects:<SubjectsPage/>,chapters:<ChaptersPage/>,review:<ReviewPage/>,behavior:<BehaviorPage/>,guide:<GuidePage/>};

  // ── Bottom nav (mobile-first) ────────────────────────────────────────────────
  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:C.bg}}>
      {/* Top bar */}
      <div style={{background:C.nav,borderBottom:`1px solid ${C.border}`,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:"#f0a500",fontSize:16,fontWeight:800}}>✦</span>
          <span style={{fontSize:14,fontWeight:800,color:C.text,letterSpacing:-.3}}>StudyLog</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {timer.on&&(
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:6,height:6,background:timer.paused?"#f0a500":"#4ade80",borderRadius:"50%",animation:timer.paused?"none":"pulse 1.5s infinite"}}/>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:timer.paused?"#f0a500":"#4ade80"}}>{padT(timer.elapsed)}</span>
            </div>
          )}
          {/* Theme toggle */}
          <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{background:"none",border:"none",cursor:"pointer",color:C.sub,padding:3,lineHeight:0,fontSize:16}}>
            {theme==="dark"?"☀️":"🌙"}
          </button>
          {/* Settings */}
          <button onClick={()=>setModal("settings")} style={{background:"none",border:"none",cursor:"pointer",color:C.sub,padding:3,lineHeight:0}}>
            <svg width={18} height={18} viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"18px 16px 100px"}}>
        {pages[page]}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.nav,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {nav.map(n=>{
          const active=page===n.id;
          const hasBadge=n.id==="review"&&todayDue.length>0;
          return(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,padding:"10px 4px 8px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",color:active?"#f0a500":"#444",position:"relative",minWidth:0}}>
              <Ic n={n.n} size={20}/>
              <span style={{fontSize:9,fontWeight:active?700:400,letterSpacing:.3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{n.lbl}</span>
              {hasBadge&&<span style={{position:"absolute",top:7,right:"50%",transform:"translateX(8px)",width:7,height:7,background:"#f0a500",borderRadius:"50%",border:"1.5px solid #0d0d1a"}}/>}
            </button>
          );
        })}
      </div>

      {/* Modals */}
      {modal==="addRecord"&&<AddRecordModal/>}
      {modal==="addSubject"&&<SubjectModal/>}
      {modal?.type==="editSubject"&&<SubjectModal existing={modal.subject}/>}
      {modal?.type==="addChapter"&&<ChapterModal subjectId={modal.subjectId}/>}
      {modal==="goals"&&<GoalsModal/>}
      {modal==="exam"&&<ExamModal/>}
      {modal==="settings"&&<SettingsModal/>}

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"9px 18px",fontSize:12,fontWeight:600,color:toast.color,zIndex:9999,boxShadow:"0 8px 32px rgba(0,0,0,.6)",whiteSpace:"nowrap",animation:"fadeIn .2s ease"}}>
          {toast.msg}
        </div>

    </div>

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      // 儲存 registration 供手動檢查使用
      window._swReg = reg;

      // 偵測到新版本時顯示橫幅
      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        newWorker.addEventListener("statechange", () => {
          if(newWorker.state === "installed" && navigator.serviceWorker.controller){
            const banner = document.getElementById("update-banner");
            if(banner) banner.style.display = "flex";
          }
        });
      });
    }).catch(()=>{});

    // 更新完成後自動重載
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      window.location.reload();
    });
  });
}

// 手動檢查更新（供設定頁呼叫）
window.checkForUpdate = function(cb) {
  if(!window._swReg){ cb && cb("no-sw"); return; }
  window._swReg.update().then(() => {
    // 如果已有 waiting worker，表示有新版本
    if(window._swReg.waiting){
      const banner = document.getElementById("update-banner");
      if(banner) banner.style.display = "flex";
      cb && cb("available");
    } else {
      cb && cb("latest");
    }
  }).catch(() => { cb && cb("error"); });
};
  </script>
</body>
