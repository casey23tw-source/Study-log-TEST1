// ─── OAuth2 PKCE helpers ──────────────────────────────────────────────────────
function genRandom(len) {
  var arr = new Uint8Array(len);
  window.crypto.getRandomValues(arr);
  return Array.from(arr, function(b){ return ('0'+b.toString(16)).slice(-2); }).join('');
}
function base64url(str) {
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function signIn() {
  var state = genRandom(16);
  save("oauth_state", state);
  var params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: "token",
    scope: SCOPES,
    state: state,
    include_granted_scopes: "true",
  });
  window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + params.toString();
}

// 處理從 Google 跳轉回來的 token
function parseOAuthCallback() {
  var hash = window.location.hash.substring(1);
  if(!hash) return null;
  var params = new URLSearchParams(hash);
  var token = params.get("access_token");
  var state = params.get("state");
  var savedState = load("oauth_state", null);
  if(!token) return null;
  if(state && savedState && state !== savedState) return null;
  // 清掉 URL hash，不然刷新會重複處理
  history.replaceState(null, null, window.location.pathname);
  return token;
}

// ─── Google Drive Sync ────────────────────────────────────────────────────────
let gToken = null;

async function gDriveRequest(method, url, body, token) {
  const res = await fetch(url, {
    method,
    headers: {
      Authorization: `Bearer ${token||gToken}`,
      "Content-Type": "application/json",
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error("Drive error " + res.status);
  return res.json();
}

async function findFile(token) {
  const r = await gDriveRequest("GET",
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id)`,
    null, token);
  const files = r.files || [];
  return files.length > 0 ? files[0].id : null;
}

async function downloadData(fileId, token) {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${token||gToken}` } }
  );
  if (!res.ok) throw new Error("Download error");
  return res.json();
}

async function uploadData(data, fileId, token) {
  const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
  if (fileId) {
    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      { method: "PATCH", headers: { Authorization: `Bearer ${token||gToken}`, "Content-Type": "application/json" }, body: blob }
    );
    if (!res.ok) throw new Error("Upload error");
    return fileId;
  } else {
    const meta = await gDriveRequest("POST",
      "https://www.googleapis.com/drive/v3/files?fields=id",
      { name: FILE_NAME, parents: ["appDataFolder"] }, token);
    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${meta.id}?uploadType=media`,
      { method: "PATCH", headers: { Authorization: `Bearer ${token||gToken}`, "Content-Type": "application/json" }, body: blob }
    );
    if (!res.ok) throw new Error("Upload error");
    return meta.id;
  }
}

  // ── Google Sign-In (Redirect Flow) ────────────────────────────────────────
  const [, forceUpdate] = useState(0);
  const tokenClientRef = useRef(null);

  useEffect(function(){
    // 檢查是否從 Google OAuth 跳轉回來
    var token = parseOAuthCallback();
    if(token){
      gToken = token;
      // 取得用戶資料
      fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
        headers: { Authorization: "Bearer " + token }
      })
      .then(function(r){ return r.json(); })

        loadFromDrive(token);
      })
      .catch(function(){ showToast("取得用戶資料失敗","#f87171"); });
      return;
    }
    // 刷新頁面時，嘗試恢復 token
    var savedToken = load("oauth_token", null);
    var savedUser = load("st2_user", null);
    if(savedToken && savedUser){
      gToken = savedToken;
      // 驗證 token 是否還有效
      fetch("https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=" + savedToken)
      .then(function(r){ return r.json(); })
      .then(function(info){
        if(info.error){
          // token 過期，清除
          save("oauth_token", null);
          save("st2_user", null);
          setUser(null);
          gToken = null;
        } else {
          setUser(savedUser);
          forceUpdate(function(n){ return n+1; });
        }
      })
      .catch(function(){});
