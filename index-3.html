<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>StudyLog ✦</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="icon" type="image/png" href="icon-192.png"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="StudyLog"/>
  <meta name="theme-color" content="#0a0a16"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0a16;color:#eeeeff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:4px;}
    input[type=time]::-webkit-calendar-picker-indicator,
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5) sepia(1) hue-rotate(180deg);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  </style>

<body>
<div id="root"></div>
<div id="err" style="display:none;padding:20px;color:#f87171;font-size:13px;font-family:monospace;background:#1a0a0a;position:fixed;top:0;left:0;right:0;bottom:0;overflow:auto;z-index:99999;white-space:pre-wrap;"></div>
<script>
window.onerror = function(msg, src, line, col, err){
  var el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent = 'ERROR:\n' + msg + '\n\nSource: ' + src + '\nLine: ' + line + ', Col: ' + col + '\n\n' + (err ? err.stack : '');
  return false;
};
window.addEventListener('unhandledrejection', function(e){
  var el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent = (el.textContent || '') + '\nPromise Error:\n' + (e.reason ? (e.reason.stack || e.reason) : e);
});
</script>

<div id="update-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#0a0a16;border-bottom:2px solid #f0a500;padding:12px 20px;flex-direction:column;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,.8);">
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="color:#f0a500;font-size:18px;">✦</span>
    <div>
      <div style="color:#eeeeff;font-size:14px;font-weight:700;">StudyLog 有新版本！</div>
      <div style="color:#888;font-size:12px;margin-top:2px;">資料不會消失，可以安心更新</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;">
    <button onclick="document.getElementById('update-banner').style.display='none'" style="background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:7px 16px;color:#888;font-size:12px;font-weight:600;cursor:pointer;">稍後</button>
    <button onclick="(function(){navigator.serviceWorker.getRegistration().then(function(r){if(r&&r.waiting)r.waiting.postMessage('skipWaiting');else window.location.reload();})})()" style="background:linear-gradient(135deg,#f0a500,#d47800);border:none;border-radius:8px;padding:7px 16px;color:#000;font-size:12px;font-weight:700;cursor:pointer;">✦ 立即更新</button>
  </div>
</div>

<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

<script type="text/plain" id="app-source">
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

// ── Constants ──────────────────────────────────────────────────────────────────
var SR_INTERVALS = [1,2,4,7,15,30,60,120];
var SR_LABELS = ["初次複習","鞏固記憶","短期強化","一週回顧","兩週鞏固","一個月","兩個月","長期維持"];
var STAR = "✦";
var PALETTE = ["#f0a500","#00d4aa","#f472b6","#60a5fa","#fb923c","#34d399","#e879f9","#f87171"];

// ── Helpers ────────────────────────────────────────────────────────────────────
function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(d,n){ var dt=new Date(d+"T00:00:00"); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
function diffDays(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function fmtDateFull(d){ return new Date(d+"T00:00:00").toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"}); }
function fmtDate(d){ return new Date(d+"T00:00:00").toLocaleDateString("zh-TW",{month:"short",day:"numeric"}); }
function toMins(t){ var p=t.split(":"); return parseInt(p[0])*60+parseInt(p[1]); }
function calcDur(s,e){ var d=toMins(e)-toMins(s); if(d<0)d+=1440; return d; }
function hhmm(m){ var h=Math.floor(m/60),mn=m%60; return mn===0?(h+"h"):(h+"h "+mn+"m"); }
function hhmmLong(m){ return Math.floor(m/60)+"h "+(m%60).toString().padStart(2,"0")+"m"; }
function padT(s){ return Math.floor(s/3600).toString().padStart(2,"0")+":"+Math.floor((s%3600)/60).toString().padStart(2,"0")+":"+(s%60).toString().padStart(2,"0"); }
function load(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function weekStart(){ var d=new Date(); d.setDate(d.getDate()-d.getDay()); return d.toISOString().slice(0,10); }
function hexToRgb(hex){ var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return [r,g,b]; }

// ── Icons ──────────────────────────────────────────────────────────────────────
var PATHS = {
  home:"M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z",
  list:"M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z",
  chart:"M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z",
  book:"M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z",
  layers:"M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27-7.38 5.74zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z",
  refresh:"M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z",
  plus:"M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
  check:"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z",
  close:"M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
  edit:"M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z",
  trash:"M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
  timer:"M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z",
  stop:"M6 6h12v12H6z",
  trophy:"M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V17H7v2h10v-2h-4v-1.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z",
  calendar:"M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z",
  help:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z",
};
function Ic(p){ return React.createElement("svg",{width:p.size||16,height:p.size||16,viewBox:"0 0 24 24",fill:"currentColor",style:{flexShrink:0}},React.createElement("path",{d:PATHS[p.n]||PATHS.check})); }

// ── Base UI ────────────────────────────────────────────────────────────────────
var IS = {width:"100%",background:"var(--input)",border:"1px solid var(--border)",borderRadius:9,padding:"9px 12px",color:"var(--text)",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
function Inp(p){ var st=Object.assign({},IS,p.style||{}); return <input style={st} value={p.value} onChange={p.onChange} type={p.type||"text"} placeholder={p.placeholder||""} min={p.min} max={p.max} autoFocus={p.autoFocus}/>; }
function Sel(p){ var st=Object.assign({},IS,{cursor:"pointer"},p.style||{}); return <select style={st} value={p.value} onChange={p.onChange}>{p.children}</select>; }
function Tex(p){ var st=Object.assign({},IS,{resize:"vertical",minHeight:72},p.style||{}); return <textarea style={st} value={p.value} onChange={p.onChange} placeholder={p.placeholder||""}/>; }
function Lbl(p){ return <div style={{color:"var(--sub)",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>{p.c}</div>; }
function F(p){ return <div style={{marginBottom:14,flex:p.half?"1":undefined}}>{p.label&&<Lbl c={p.label}/>}{p.children}</div>; }

function Btn(p){
  var v = p.v||"primary";
  var sm = p.sm;
  var disabled = p.disabled;
  var base = {border:"none",borderRadius:9,cursor:disabled?"not-allowed":"pointer",fontWeight:600,display:"inline-flex",alignItems:"center",gap:6,transition:"opacity 0.15s",opacity:disabled?0.45:1,fontFamily:"inherit",letterSpacing:.2};
  var vs = {
    primary:{background:"linear-gradient(135deg,#f0a500,#d47800)",color:"#000",padding:sm?"5px 13px":"9px 18px",fontSize:sm?12:13},
    ghost:{background:"transparent",color:"var(--sub)",padding:sm?"4px 10px":"8px 14px",fontSize:sm?12:13,border:"1px solid var(--border)"},
    danger:{background:"var(--dangerBg,#1e0a0a)",color:"#f87171",padding:sm?"5px 13px":"9px 18px",fontSize:sm?12:13,border:"1px solid var(--dangerBorder,#3a1a1a)"},
    teal:{background:"linear-gradient(135deg,#00d4aa,#009e7a)",color:"#000",padding:sm?"5px 13px":"9px 18px",fontSize:sm?12:13},
  };
  return <button style={Object.assign({},base,vs[v]||vs.primary,p.style||{})} onClick={p.onClick} disabled={disabled}
    onMouseEnter={function(e){if(!disabled)e.currentTarget.style.opacity=".75";}}
    onMouseLeave={function(e){e.currentTarget.style.opacity="1";}}>{p.children}</button>;
}

function Card(p){
  return <div style={Object.assign({background:"var(--card)",border:"1px solid "+(p.glow||"var(--border)"),borderRadius:14,padding:20},p.style||{})}>{p.children}</div>;
}

function Tag(p){
  return <span style={{fontSize:10,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",color:p.color||"#60a5fa",background:p.bg||"var(--tagBg)",padding:"2px 7px",borderRadius:20,whiteSpace:"nowrap"}}>{p.children}</span>;
}

function Modal(p){
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={p.onClose}>
      <div style={{background:"var(--modal)",border:"1px solid var(--border)",borderRadius:18,padding:24,width:"100%",maxWidth:440,maxHeight:"90vh",overflowY:"auto"}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:700,color:"var(--text)",letterSpacing:.3}}>{STAR} {p.title}</div>
          <button onClick={p.onClose} style={{background:"none",border:"none",color:"var(--sub)",cursor:"pointer",padding:4,lineHeight:0}}><Ic n="close" size={18}/></button>
        </div>
        {p.children}
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App(){
  var recs = useState(function(){ return load("st2_records",[]); });
  var records = recs[0]; var setRecords = recs[1];

  var subj = useState(function(){ return load("st2_subjects",[{id:"1",name:"數學",color:"#f0a500"},{id:"2",name:"英文",color:"#00d4aa"}]); });
  var subjects = subj[0]; var setSubjects = subj[1];

  var chap = useState(function(){ return load("st2_chapters",[]); });
  var chapters = chap[0]; var setChapters = chap[1];

  var gls = useState(function(){ return load("st2_goals",{daily:120,weekly:840}); });
  var goals = gls[0]; var setGoals = gls[1];

  var exm = useState(function(){ return load("st2_exam",{date:"",name:""}); });
  var exam = exm[0]; var setExam = exm[1];

  var pg = useState("dashboard");
  var page = pg[0]; var setPage = pg[1];

  var md = useState(null);
  var modal = md[0]; var setModal = md[1];

  var tm = useState({on:false,paused:false,start:null,pausedAt:0,subId:"",elapsed:0});
  var timer = tm[0]; var setTimer = tm[1];

  var ts = useState(null);
  var toast = ts[0]; var setToast = ts[1];

  var th = useState(function(){ return load("st2_theme","dark"); });
  var theme = th[0]; var setTheme = th[1];

  var sd = useState(function(){ return load("st2_startDate",""); });
  var startDate = sd[0]; var setStartDate = sd[1];

  var timerRef = useRef(null);
  var today = todayStr();

  // ── Theme ──────────────────────────────────────────────────────────────────
  var C = theme==="light" ? {
    bg:"#f5f5f0",card:"#ffffff",border:"#d0d0da",text:"#111122",sub:"#666",dim:"#999",
    input:"#ebebea",nav:"#ffffff",modal:"#ffffff",modalInner:"#f0f0ea",barBg:"#d8d8e0",tagBg:"#e0e0e8",dangerBg:"#636363",dangerBorder:"#505050",
  } : {
    bg:"#0a0a16",card:"#111128",border:"#1e1e3a",text:"#eeeeff",sub:"#888",dim:"#555",
    input:"#1e1e36",nav:"#0d0d1a",modal:"#111128",modalInner:"#1e1e36",barBg:"#1a1a2e",tagBg:"#0d1520",dangerBg:"#1e0a0a",dangerBorder:"#3a1a1a",
  };

  useEffect(function(){
    var r = document.documentElement;
    r.style.setProperty("--bg",C.bg); r.style.setProperty("--card",C.card);
    r.style.setProperty("--border",C.border); r.style.setProperty("--text",C.text);
    r.style.setProperty("--sub",C.sub); r.style.setProperty("--dim",C.dim);
    r.style.setProperty("--input",C.input); r.style.setProperty("--nav",C.nav);
    r.style.setProperty("--modal",C.modal); r.style.setProperty("--modalInner",C.modalInner);
    r.style.setProperty("--barBg",C.barBg); r.style.setProperty("--tagBg",C.tagBg);
    r.style.setProperty("--dangerBg",C.dangerBg); r.style.setProperty("--dangerBorder",C.dangerBorder);
    document.body.style.background = C.bg;
  },[theme]);

  // ── Persist ────────────────────────────────────────────────────────────────
  useEffect(function(){save("st2_records",records);},[records]);
  useEffect(function(){save("st2_subjects",subjects);},[subjects]);
  useEffect(function(){save("st2_chapters",chapters);},[chapters]);
  useEffect(function(){save("st2_goals",goals);},[goals]);
  useEffect(function(){save("st2_exam",exam);},[exam]);
  useEffect(function(){save("st2_theme",theme);},[theme]);
  useEffect(function(){save("st2_startDate",startDate);},[startDate]);

  // ── Timer ──────────────────────────────────────────────────────────────────
  useEffect(function(){
    if(timer.on && !timer.paused){
      timerRef.current = setInterval(function(){
        setTimer(function(t){ return Object.assign({},t,{elapsed:t.pausedAt+Math.floor((Date.now()-t.start)/1000)}); });
      },1000);
    } else {
      clearInterval(timerRef.current);
    }
    return function(){ clearInterval(timerRef.current); };
  },[timer.on,timer.paused]);

  function showToast(msg,color){ setToast({msg:msg,color:color||"#4ade80"}); setTimeout(function(){setToast(null);},2200); }
  function addRecord(r){ setRecords(function(p){ var nr=Object.assign({id:Date.now().toString()},r); return [nr].concat(p); }); }
  function delRecord(id){ setRecords(function(p){ return p.filter(function(r){ return r.id!==id; }); }); }

  function startTimer(subId){ setTimer({on:true,paused:false,start:Date.now(),pausedAt:0,subId:subId,elapsed:0}); }
  function pauseTimer(){
    if(timer.paused){
      setTimer(function(t){ return Object.assign({},t,{paused:false,start:Date.now(),pausedAt:t.elapsed}); });
    } else {
      setTimer(function(t){ return Object.assign({},t,{paused:true}); });
    }
  }
  function stopTimer(){
    var mins = Math.round(timer.elapsed/60);
    if(mins>0 && timer.subId){
      var now = new Date();
      var st = new Date(now.getTime()-timer.elapsed*1000);
      var f2 = function(d){ return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"); };
      addRecord({date:today,startTime:f2(st),endTime:f2(now),subjectId:timer.subId,duration:mins,note:"計時模式",type:"new"});
      showToast("✦ 已儲存 "+hhmm(mins));
    }
    setTimer({on:false,paused:false,start:null,pausedAt:0,subId:"",elapsed:0});
  }

  // ── Notifications ──────────────────────────────────────────────────────────
  function requestNotifPerm(){ if("Notification" in window) Notification.requestPermission(); }

  // ── Export / Import ────────────────────────────────────────────────────────
  function exportData(){
    var data = {records:records,subjects:subjects,chapters:chapters,goals:goals,exam:exam,exportedAt:new Date().toISOString()};
    var blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href=url; a.download="studylog-backup-"+today+".json"; a.click();
    URL.revokeObjectURL(url);
    showToast("✦ 資料已匯出");
  }
  function importData(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        if(data.records) setRecords(data.records);
        if(data.subjects) setSubjects(data.subjects);
        if(data.chapters) setChapters(data.chapters);
        if(data.goals) setGoals(data.goals);
        if(data.exam) setExam(data.exam);
        showToast("✦ 資料已匯入");
        setModal(null);
      }catch(err){ showToast("匯入失敗","#f87171"); }
    };
    reader.readAsText(file);
  }

  // ── Derived ────────────────────────────────────────────────────────────────
  // 進行中章節：有讀書紀錄且尚未完成
  var inProgressChapIds = (function(){
    var set = {};
    chapters.filter(function(c){return !c.completed;}).forEach(function(c){
      var hasRecord = records.some(function(r){
        return r.note && r.note.indexOf(c.name) >= 0;
      });
      if(hasRecord) set[c.id] = 1;
    });
    return set;
  })();

  var todayMins = records.filter(function(r){return r.date===today;}).reduce(function(s,r){return s+r.duration;},0);
  var wkStart = weekStart();
  var weekMins = records.filter(function(r){return r.date>=wkStart;}).reduce(function(s,r){return s+r.duration;},0);
  var monthMins = records.filter(function(r){return r.date.slice(0,7)===today.slice(0,7);}).reduce(function(s,r){return s+r.duration;},0);
  var totalMins = records.reduce(function(s,r){return s+r.duration;},0);
  var subMins = subjects.map(function(s){
    return Object.assign({},s,{mins:records.filter(function(r){return r.subjectId===s.id;}).reduce(function(a,r){return a+r.duration;},0)});
  }).sort(function(a,b){return b.mins-a.mins;});
  var examDays = exam.date ? diffDays(today,exam.date) : null;
  var todayDue = chapters.filter(function(c){return c.nextReview&&c.nextReview<=today&&c.completed;});
  var streakDays = (function(){
    var days = [];
    var seen = {};
    records.forEach(function(r){if(!seen[r.date]){seen[r.date]=1;days.push(r.date);}});
    days.sort().reverse();
    var s=0,cur=today;
    for(var i=0;i<days.length;i++){
      if(days[i]===cur){s++;cur=addDays(cur,-1);}
      else if(days[i]<cur)break;
    }
    return s;
  })();

  // ── 等級系統 ────────────────────────────────────────────────────────────────
  var LEVELS = [
    {min:0,    name:"新手",    icon:"🌱", color:"#888",    next:10},
    {min:10,   name:"學徒",    icon:"📖", color:"#60a5fa", next:30},
    {min:30,   name:"讀者",    icon:"📚", color:"#00d4aa", next:60},
    {min:60,   name:"學者",    icon:"🎓", color:"#f0a500", next:120},
    {min:120,  name:"博士",    icon:"🏆", color:"#f472b6", next:300},
    {min:300,  name:"大師",    icon:"⭐", color:"#e879f9", next:600},
    {min:600,  name:"傳說",    icon:"👑", color:"#f87171", next:null},
  ];
  var totalHours = Math.floor(totalMins/60);
  var currentLevel = (function(){
    var lv = LEVELS[0];
    for(var i=0;i<LEVELS.length;i++){ if(totalHours>=LEVELS[i].min) lv=LEVELS[i]; }
    return lv;
  })();
  var nextLevel = LEVELS[LEVELS.indexOf(currentLevel)+1]||null;
  var lvPct = nextLevel ? Math.min((totalHours-currentLevel.min)/(nextLevel.min-currentLevel.min)*100,100) : 100;

  // ── 連續天數里程碑 ──────────────────────────────────────────────────────────
  var MILESTONES = [3,7,14,30,60,100,180,365];
  var celebState = useState(null); var celebMsg=celebState[0]; var setCelebMsg=celebState[1];
  var lastStreakRef = useRef(load("st2_lastStreak",0));
  useEffect(function(){
    var prev = lastStreakRef.current;
    if(streakDays > prev){
      save("st2_lastStreak", streakDays);
      lastStreakRef.current = streakDays;
      for(var i=0;i<MILESTONES.length;i++){
        if(streakDays===MILESTONES[i]){
          setCelebMsg(streakDays);
          setTimeout(function(){setCelebMsg(null);},4000);
          break;
        }
      }
    }
  },[streakDays]);

  function completeReview(cid){
    setChapters(function(p){return p.map(function(c){
      if(c.id!==cid)return c;
      var next=c.reviewCount+1;
      return Object.assign({},c,{reviewCount:next,lastReview:today,nextReview:addDays(today,SR_INTERVALS[Math.min(next,SR_INTERVALS.length-1)])});
    });});
    showToast("✦ 複習完成！");
  }
  function markRead(cid){
    setChapters(function(p){return p.map(function(c){
      if(c.id!==cid||c.completed)return c;
      return Object.assign({},c,{completed:true,firstRead:today,reviewCount:0,nextReview:addDays(today,SR_INTERVALS[0])});
    });});
    showToast("✦ 章節完成，已排入複習！");
  }
  function unmarkRead(cid){
    setChapters(function(p){return p.map(function(c){
      if(c.id!==cid)return c;
      return Object.assign({},c,{completed:false,firstRead:null,reviewCount:0,nextReview:null,lastReview:null});
    });});
    showToast("✦ 已取消完成");
  }

  // ── Stats ──────────────────────────────────────────────────────────────────
  function StatsPage(){

    var subStats = subjects.map(function(s){
      var mins = records.filter(function(r){return r.subjectId===s.id;}).reduce(function(a,r){return a+r.duration;},0);
      return {id:s.id,name:s.name,color:s.color,mins:mins};
    }).sort(function(a,b){return b.mins-a.mins;});
    var totalSubMins = Math.max(subStats.reduce(function(s,x){return s+x.mins;},0),1);

    var weekDays = [];

    var weekMax = Math.max(1, weekDays.reduce(function(m,d){return d.mins>m?d.mins:m;},0));

                <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>

  // ── Chapters ───────────────────────────────────────────────────────────────
  function ChaptersPage(){
    var selState = useState(subjects[0]?subjects[0].id:""); var sel=selState[0]; var setSel=selState[1];
    var sortState = useState("default"); var sort=sortState[0]; var setSort=sortState[1];
    var sub = subjects.find(function(s){return s.id===sel;});

    var chaps = (function(){
      var src = chapters.filter(function(c){return c.subjectId===sel;});
      if(sort==="name") src=src.slice().sort(function(a,b){return a.name.localeCompare(b.name,"zh");});
      else if(sort==="review") src=src.slice().sort(function(a,b){return (a.nextReview||"9999").localeCompare(b.nextReview||"9999");});
      else if(sort==="pending") src=src.slice().sort(function(a,b){return (a.completed?1:0)-(b.completed?1:0);});
      return src;
    })();
    var done = chaps.filter(function(c){return c.completed;}).length;

    return (
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text}}>{STAR} 章節追蹤</div>
          <div style={{display:"flex",gap:6}}>
            <Sel value={sort} onChange={function(e){setSort(e.target.value);}} style={{width:90,fontSize:11,padding:"4px 8px"}}>
              <option value="default">預設</option>
              <option value="name">名稱</option>
              <option value="review">複習日</option>
              <option value="pending">待完成</option>
            </Sel>
            <Btn sm={true} onClick={function(){setModal({type:"addChapter",subjectId:sel,onDone:function(id){setSel(id);}});}} disabled={!sel}><Ic n="plus" size={13}/> 新增</Btn>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {subjects.map(function(s,i){
            var active = s.id===sel;
            var cnt = chapters.filter(function(c){return c.subjectId===s.id&&c.nextReview&&c.nextReview<=today&&c.completed;}).length;
            return (
              <button key={s.id}
                onClick={function(){setSel(s.id);}}
                style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+(active?s.color:C.border),background:active?s.color+"22":"transparent",color:active?s.color:C.sub,fontSize:12,fontWeight:active?700:400,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                {s.name}{cnt>0&&<span style={{background:s.color,color:"#000",borderRadius:8,padding:"0 4px",fontSize:9,fontWeight:800}}>{cnt}</span>}
              </button>
            );
          })}
        </div>
        {chaps.length>0 && (
          <Card style={{padding:"11px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:11,color:C.sub}}>完成進度</span>
              <span style={{fontSize:11,color:C.sub,fontFamily:"'DM Mono',monospace"}}>{done}/{chaps.length}</span>
            </div>
            <div style={{height:4,background:C.barBg,borderRadius:4}}>
              <div style={{height:"100%",width:(chaps.length>0?done/chaps.length*100:0)+"%",background:sub?sub.color:"#f0a500",borderRadius:4}}/>
            </div>
          </Card>
        )}
        {chaps.length===0 && <div style={{color:C.dim,textAlign:"center",padding:48,fontSize:13}}>尚無章節，點右上角新增</div>}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {chaps.map(function(c){
            var overdue = c.nextReview&&c.nextReview<=today&&c.completed;
            var isInProgress = !c.completed && inProgressChapIds[c.id];
            var dotColor = c.completed ? "#4ade80" : (isInProgress ? "#f0a500" : C.barBg);
            return (
              <div key={c.id} style={{background:C.card,border:"1px solid "+(overdue?"#5a3a0a":C.border),borderRadius:10,padding:"11px 13px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                      <span style={{width:7,height:7,borderRadius:"50%",background:dotColor,flexShrink:0,animation:isInProgress?"pulse 1.5s infinite":"none"}}/>
                      <span style={{fontSize:12,fontWeight:600,color:c.completed?C.text:(isInProgress?C.text:C.sub)}}>{c.name}</span>
                      {overdue && <Tag color="#f0a500">{STAR} 今日複習</Tag>}
                    </div>
                    {c.completed ? (
                      <div style={{fontSize:11,color:C.dim,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                        <Tag color="#60a5fa">{SR_LABELS[Math.min(c.reviewCount,SR_LABELS.length-1)]}</Tag>
                        <span>首讀 {c.firstRead}</span>
                        <span>複習 {c.reviewCount} 次</span>
                        {c.nextReview && <span>下次 {c.nextReview}</span>}

                    ) : (
                      <div style={{fontSize:11,color:C.dim}}>尚未閱讀</div>
                    )}
                  </div>
                  <div style={{display:"flex",gap:5,flexShrink:0}}>
                    {!c.completed && <Btn v="teal" sm={true} onClick={function(){markRead(c.id);}}><Ic n="check" size={11}/> 完成</Btn>}
                    {c.completed && (
                      <button onClick={function(){unmarkRead(c.id);}}
                        style={{background:"none",border:"1px solid "+C.border,borderRadius:7,padding:"3px 8px",color:C.dim,fontSize:11,cursor:"pointer"}}
                        onMouseEnter={function(e){e.currentTarget.style.borderColor="#f87171";e.currentTarget.style.color="#f87171";}}
                        onMouseLeave={function(e){e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.dim;}}>
                        取消
                      </button>
                    )}
                    <Btn v="danger" sm={true} onClick={function(){setChapters(function(p){return p.filter(function(x){return x.id!==c.id;});});}}><Ic n="trash" size={11}/></Btn>
                  </div>
                </div>
                {c.completed && (
                  <div>
                    <div style={{height:1,background:C.border,margin:"8px 0"}}/>
                    <div style={{display:"flex",justifyContent:"flex-end"}}>
                      <button onClick={function(){setModal({type:"adjustReview",chapter:c});}}
                        style={{background:"none",border:"1px solid "+C.border,borderRadius:6,padding:"2px 8px",color:"#60a5fa",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",gap:3,whiteSpace:"nowrap"}}
                        onMouseEnter={function(e){e.currentTarget.style.borderColor="#60a5fa";e.currentTarget.style.background=C.input;}}
                        onMouseLeave={function(e){e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background="none";}}>
                        <svg width={10} height={10} viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        調整
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Review ─────────────────────────────────────────────────────────────────

    return (
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:18,fontWeight:800,color:C.text}}>{STAR} 複習排程</div>
        {overdue.length===0 && <Card><div style={{textAlign:"center",padding:20,color:C.sub,fontSize:13}}>✦ 今日無待複習項目</div></Card>}
        {overdue.length>0 && (
          <Card glow="#3a2a0a">
            <div style={{fontSize:11,color:"#f0a500",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{STAR} 待複習（{overdue.length} 項）</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {overdue.map(function(c){
                var sub = subjects.find(function(s){return s.id===c.subjectId;});

                  <div key={c.id} style={{background:C.card,border:"1px solid "+(isDue?"#5a3a0a":C.border),borderRadius:10,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                        <span style={{width:5,height:5,borderRadius:"50%",background:sub?sub.color:"#888",flexShrink:0}}/>
                        <span style={{fontSize:10,color:sub?sub.color:C.sub}}>{sub?sub.name:""}</span>
                      </div>
                      <div style={{fontSize:13,fontWeight:600,color:C.text}}>{c.name}</div>
                      <div style={{fontSize:10,color:C.dim,marginTop:2}}>
                        <Tag color="#60a5fa">{SR_LABELS[Math.min(c.reviewCount,SR_LABELS.length-1)]}</Tag>
                        <span style={{marginLeft:6}}>第 {c.reviewCount+1} 次複習</span>

                  </div>
                );
              })}
            </div>
          </Card>
        )}
        {upcoming.length>0 && (
          <Card>
            <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>即將複習</div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {upcoming.map(function(c){
                var sub = subjects.find(function(s){return s.id===c.subjectId;});
                var diff = diffDays(today,c.nextReview);
                return (
                  <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.input,borderRadius:8}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600,color:C.text}}>{c.name}</div>
                      <div style={{fontSize:10,color:C.dim,marginTop:1}}>{sub?sub.name:""}</div>

                      <div style={{fontSize:9,color:C.dim}}>{c.nextReview}</div>
                    </div>
                  </div>

              })}
            </div>

  // ── Behavior ───────────────────────────────────────────────────────────────
  function BehaviorPage(){
    var heatDays = [];
    for(var i=69;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);heatDays.push(d.toISOString().slice(0,10));}
    var heatMax = Math.max(1, heatDays.reduce(function(m,d){
      var mins=records.filter(function(r){return r.date===d;}).reduce(function(s,r){return s+r.duration;},0);
      return mins>m?mins:m;
    },0));

    var studyDaysSet2 = {};
    records.forEach(function(r){studyDaysSet2[r.date]=1;});
    var studyDaysCount = Object.keys(studyDaysSet2).length;

    var nextMilestone = null;
    for(var mi=0;mi<MILESTONES.length;mi++){
      if(MILESTONES[mi]>streakDays){nextMilestone=MILESTONES[mi];break;}
    }

    return (
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:18,fontWeight:800,color:C.text}}>{STAR} 成就總覽</div>

        {/* 等級卡片 */}
        <Card glow={currentLevel.color+"66"}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:48,lineHeight:1}}>{currentLevel.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:C.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>目前等級</div>
              <div style={{fontSize:22,fontWeight:800,color:currentLevel.color,marginBottom:6}}>{currentLevel.name}</div>
              {nextLevel ? (
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:10,color:C.sub}}>{totalHours}h / {nextLevel.min}h</span>
                    <span style={{fontSize:10,color:currentLevel.color,fontWeight:700}}>{Math.round(lvPct)}%</span>
                  </div>
                  <div style={{height:6,background:C.barBg,borderRadius:6,overflow:"hidden"}}>
                    <div style={{height:"100%",width:lvPct+"%",background:currentLevel.color,borderRadius:6,transition:"width .6s ease"}}/>
                  </div>
                  <div style={{fontSize:10,color:C.dim,marginTop:4}}>
                    再 {nextLevel.min-totalHours} 小時 → {nextLevel.icon} {nextLevel.name}
                  </div>
                </div>
              ) : (
                <div style={{fontSize:12,color:currentLevel.color,fontWeight:600}}>已達最高等級！</div>
              )}
            </div>
          </div>
          {/* 等級列表 */}
          <div style={{display:"flex",gap:4,marginTop:14,flexWrap:"wrap"}}>
            {LEVELS.map(function(lv){
              var reached = totalHours>=lv.min;
              return (
                <div key={lv.name} title={lv.name+" ("+lv.min+"h)"} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,opacity:reached?1:0.3}}>
                  <div style={{fontSize:18}}>{lv.icon}</div>
                  <div style={{fontSize:8,color:reached?lv.color:C.dim,fontWeight:600}}>{lv.name}</div>
                </div>
              );
            })}
          </div>
        </Card>

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[
            {lbl:"連續天數",v:streakDays,unit:"天",color:"#f0a500"},
            {lbl:"讀書日數",v:studyDaysCount,unit:"天",color:"#00d4aa"},
            {lbl:"總讀書",v:totalHours,unit:"小時",color:"#60a5fa"},
          ].map(function(x){
            return (
              <Card key={x.lbl} style={{padding:14,textAlign:"center"}}>
                <div style={{fontSize:10,color:C.sub,marginBottom:6}}>{x.lbl}</div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:800,color:x.color}}>{x.v}</div>
                <div style={{fontSize:10,color:C.dim,marginTop:2}}>{x.unit}</div>
              </Card>
            );
          })}
        </div>

        {/* 連續天數里程碑進度 */}
        <Card>
          <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{STAR} 連續天數里程碑</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {MILESTONES.map(function(m){
              var reached = streakDays>=m;
              var isCurrent = nextMilestone===m;
              return (
                <div key={m} style={{flex:"0 0 auto",textAlign:"center",padding:"8px 10px",borderRadius:10,background:reached?"#f0a50022":(isCurrent?C.input:C.input),border:"1px solid "+(reached?"#f0a500":(isCurrent?C.border:C.border)),opacity:reached?1:isCurrent?0.8:0.4}}>
                  <div style={{fontSize:16}}>{reached?"🏅":"🔒"}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:800,color:reached?"#f0a500":C.dim,marginTop:2}}>{m}</div>
                  <div style={{fontSize:9,color:C.dim}}>天</div>
                </div>
              );
            })}
          </div>
          {nextMilestone && (
            <div style={{marginTop:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:C.sub}}>距下一個里程碑</span>
                <span style={{fontSize:11,color:"#f0a500",fontWeight:700}}>{nextMilestone-streakDays} 天</span>
              </div>
              <div style={{height:4,background:C.barBg,borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:(streakDays/nextMilestone*100)+"%",background:"#f0a500",borderRadius:4}}/>
              </div>
            </div>
          )}
        </Card>

        <Card>
          <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>讀書熱度圖（近10週）{STAR}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:3}}>
            {(function(){
              var cells = [];
              for(var week=0;week<10;week++){
                for(var dow2=0;dow2<7;dow2++){
                  var idx = week*7+dow2;
                  if(idx>=heatDays.length){cells.push(<div key={"e"+idx}/>);continue;}
                  var d2 = heatDays[idx];
                  var m2 = records.filter(function(r){return r.date===d2;}).reduce(function(s,r){return s+r.duration;},0);
                  var intensity = m2/heatMax;
                  var sat = Math.round(40+intensity*50);
                  var light = theme==="light" ? Math.round(90-intensity*55) : Math.round(15+intensity*35);

                  cells.push(<div key={d2} title={d2+" "+hhmm(m2)} style={{aspectRatio:"1",borderRadius:3,background:bg2}}/>);
                }
              }
              return cells;
            })()}

  function SubjectModal(p){
    var existing = p.existing;
    var nState = useState(existing?existing.name:""); var name=nState[0]; var setName=nState[1];
    var cState = useState(existing?existing.color:PALETTE[subjects.length%PALETTE.length]); var color=cState[0]; var setColor=cState[1];
    var wState = useState(false); var showWheel=wState[0]; var setShowWheel=wState[1];
    var brState = useState(100); var brightness=brState[0]; var setBrightness=brState[1];
    var wheelRef = useRef(null);
    var dragging = useRef(false);

    function ok(){
      if(!name.trim())return;
      if(existing) setSubjects(function(p2){return p2.map(function(s){return s.id===existing.id?Object.assign({},s,{name:name,color:color}):s;});});
      else setSubjects(function(p2){return p2.concat([{id:Date.now().toString(),name:name,color:color}]);});
      setModal(null); showToast("✦ "+(existing?"已更新":"已新增")+" "+name);
    }

    useEffect(function(){
      if(!showWheel) return;
      var raf = requestAnimationFrame(function(){
        var canvas = wheelRef.current;
        if(!canvas) return;
        var ctx = canvas.getContext("2d");
        var W = canvas.width;
        var cx = W/2, cy = W/2, r = W/2-2;
        ctx.clearRect(0,0,W,W);
        for(var i=0;i<360;i++){
          var a1 = (i-1)*Math.PI/180 - Math.PI/2;
          var a2 = (i+1)*Math.PI/180 - Math.PI/2;
          var grad = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
          grad.addColorStop(0,"#ffffff");
          grad.addColorStop(1,"hsl("+i+",100%,50%)");
          ctx.beginPath(); ctx.moveTo(cx,cy);
          ctx.arc(cx,cy,r,a1,a2); ctx.closePath();
          ctx.fillStyle=grad; ctx.fill();
        }
        if(brightness<100){
          ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
          ctx.fillStyle="rgba(0,0,0,"+((100-brightness)/100)+")"; ctx.fill();
        }
      });
      return function(){ cancelAnimationFrame(raf); };
    },[showWheel,brightness]);

    function pickColor(clientX,clientY){
      var canvas=wheelRef.current; if(!canvas)return;
      var rect=canvas.getBoundingClientRect();
      var sx=canvas.width/rect.width, sy=canvas.height/rect.height;
      var x=Math.round((clientX-rect.left)*sx), y=Math.round((clientY-rect.top)*sy);
      var cx=canvas.width/2, cy=canvas.height/2, r=canvas.width/2-2;
      if((x-cx)*(x-cx)+(y-cy)*(y-cy)>r*r) return;
      var data=canvas.getContext("2d").getImageData(x,y,1,1).data;
      if(data[3]<10) return;
      setColor("#"+[data[0],data[1],data[2]].map(function(v){return v.toString(16).padStart(2,"0");}).join(""));
    }

    var isCustom = PALETTE.indexOf(color)===-1;

    return (
      <Modal title={existing?"編輯科目":"新增科目"} onClose={function(){setModal(null);}}>
        <F label="名稱"><Inp value={name} onChange={function(e){setName(e.target.value);}} placeholder="例：數學"/></F>
        <F label="顏色">
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
            {PALETTE.slice(0,7).map(function(c){
              return <button key={c} onClick={function(){setColor(c);setShowWheel(false);}} style={{width:28,height:28,borderRadius:7,background:c,border:"2px solid "+(color===c?"#fff":"transparent"),cursor:"pointer",flexShrink:0}}/>;
            })}
            <button onClick={function(){setShowWheel(function(v){return !v;});}}
              style={{width:28,height:28,borderRadius:7,background:"conic-gradient(red,yellow,lime,cyan,blue,magenta,red)",border:"2px solid "+(showWheel||isCustom?"#fff":"transparent"),cursor:"pointer",flexShrink:0}}/>
          </div>
          {showWheel && (
            <div style={{background:C.input,borderRadius:14,padding:14,border:"1px solid "+C.border,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
                <canvas ref={wheelRef} width={240} height={240}
                  style={{borderRadius:"50%",cursor:"crosshair",width:220,height:220,display:"block",touchAction:"none",boxShadow:"0 2px 16px rgba(0,0,0,.4)"}}
                  onMouseDown={function(e){dragging.current=true;pickColor(e.clientX,e.clientY);}}
                  onMouseMove={function(e){if(dragging.current)pickColor(e.clientX,e.clientY);}}
                  onMouseUp={function(){dragging.current=false;}}
                  onMouseLeave={function(){dragging.current=false;}}
                  onTouchStart={function(e){e.preventDefault();pickColor(e.touches[0].clientX,e.touches[0].clientY);}}
                  onTouchMove={function(e){e.preventDefault();pickColor(e.touches[0].clientX,e.touches[0].clientY);}}
                />
              </div>
              <div style={{marginBottom:4}}>
                <div style={{fontSize:10,color:C.sub,marginBottom:5}}>亮度 {brightness}%</div>
                <div style={{position:"relative",height:16,borderRadius:8,background:"linear-gradient(to right,#000,"+color+")",overflow:"hidden"}}>
                  <input type="range" min="10" max="100" value={brightness}
                    onChange={function(e){setBrightness(parseInt(e.target.value));}}
                    style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer",margin:0}}/>
                  <div style={{position:"absolute",top:"50%",transform:"translateY(-50%)",left:((brightness-10)/90*100)+"%",width:14,height:14,borderRadius:"50%",background:"#fff",boxShadow:"0 0 3px rgba(0,0,0,.5)",marginLeft:"-7px",pointerEvents:"none"}}/>
                </div>
              </div>
              <div style={{fontSize:10,color:C.dim,textAlign:"center",marginTop:6}}>拖曳圓盤選色・拖曳滑桿調亮度</div>
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:20,height:20,borderRadius:5,background:color,border:"1px solid "+C.border,flexShrink:0}}/>
            <span style={{fontSize:12,color:C.text,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{color}</span>
          </div>
        </F>
        <div style={{height:3,background:color,borderRadius:3,marginBottom:14}}/>
        <Btn onClick={ok} style={{width:"100%",justifyContent:"center"}}>{existing?"儲存":"新增科目"}</Btn>
      </Modal>
    );
  }

  function ChapterModal(p){
    var subjectId = p.subjectId;
    var mdState = useState("single"); var mode=mdState[0]; var setMode=mdState[1];
    var nmState = useState(""); var name=nmState[0]; var setName=nmState[1];
    var prState = useState("第"); var prefix=prState[0]; var setPrefix=prState[1];
    var sfState = useState("章"); var suffix=sfState[0]; var setSuffix=sfState[1];
    var frState = useState(1); var from=frState[0]; var setFrom=frState[1];
    var toState = useState(5); var to2=toState[0]; var setTo=toState[1];
    var ssState = useState(subjectId||(subjects[0]?subjects[0].id:"")); var selSub=ssState[0]; var setSelSub=ssState[1];

    var preview = [];
    if(mode==="single"){ if(name.trim()) preview=[name.trim()]; }
    else {
      var f2=Math.min(Math.max(parseInt(from)||1,1),999);
      var t2=Math.min(Math.max(parseInt(to2)||1,1),999);
      for(var pi=f2;pi<=t2&&preview.length<200;pi++) preview.push(prefix+pi+suffix);
    }

    function ok(){
      if(preview.length===0)return;

                <input value={suffix} onChange={function(e){setSuffix(e.target.value);}} placeholder="章" style={{width:"100%",background:C.input,border:"1px solid "+C.border,borderRadius:8,padding:"7px 4px",color:C.text,fontSize:13,textAlign:"center",outline:"none",boxSizing:"border-box"}}/>

              <div style={{flex:"0 0 16px",textAlign:"center",paddingBottom:8,color:C.dim,fontSize:12}}>：</div>

              </div>
              <div style={{flex:"0 0 14px",textAlign:"center",paddingBottom:8,color:C.dim}}>—</div>

  function AdjustReviewModal(p){
    var c = p.chapter;
    var rState = useState(c.reviewCount); var reviewCount=rState[0]; var setReviewCount=rState[1];
    var nextReviewDate = reviewCount < SR_INTERVALS.length
      ? addDays(today, SR_INTERVALS[reviewCount])
      : addDays(today, SR_INTERVALS[SR_INTERVALS.length-1]);

    function ok(){
      setChapters(function(prev){return prev.map(function(ch){
        if(ch.id!==c.id) return ch;
        return Object.assign({},ch,{
          reviewCount: reviewCount,
          nextReview: addDays(today, SR_INTERVALS[Math.min(reviewCount, SR_INTERVALS.length-1)]),
          lastReview: today,
        });
      });});
      setModal(null);
      showToast("✦ 複習進度已更新");
    }

    return (
      <Modal title="調整複習進度" onClose={function(){setModal(null);}}>
        <div style={{background:C.input,borderRadius:10,padding:"12px 14px",marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>{c.name}</div>
          <div style={{fontSize:11,color:C.sub}}>首讀：{c.firstRead||"未知"}</div>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:C.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>已複習次數</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {SR_INTERVALS.map(function(interval, i){
              var active = reviewCount===i;
              return (
                <button key={i} onClick={function(){setReviewCount(i);}}
                  style={{padding:"8px 12px",borderRadius:9,border:"1px solid "+(active?"#60a5fa":C.border),background:active?"#60a5fa22":"transparent",color:active?"#60a5fa":C.sub,fontSize:12,fontWeight:active?700:400,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <span style={{fontSize:14,fontWeight:700}}>{i}</span>
                  <span style={{fontSize:9}}>{SR_LABELS[i]}</span>
                </button>
              );
            })}
          </div>
        </div>

        <div style={{background:C.input,borderRadius:10,padding:"12px 14px",marginBottom:16}}>
          <div style={{fontSize:11,color:C.sub,marginBottom:6}}>根據選擇的複習次數，下次複習將排在：</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:15,fontWeight:800,color:"#60a5fa",fontFamily:"'DM Mono',monospace"}}>{nextReviewDate}</div>
              <div style={{fontSize:11,color:C.dim,marginTop:2}}>
                {SR_INTERVALS[Math.min(reviewCount, SR_INTERVALS.length-1)]} 天後 · {SR_LABELS[Math.min(reviewCount, SR_LABELS.length-1)]}
              </div>
            </div>
            <div style={{fontSize:28}}>{reviewCount===0?"🌱":reviewCount<3?"📖":reviewCount<5?"📚":"🎓"}</div>
          </div>
        </div>

        <Btn onClick={ok} style={{width:"100%",justifyContent:"center"}}>
          <Ic n="check" size={13}/> 確認更新
        </Btn>
      </Modal>
    );
  }

              <input type="number" value={weeklyM} min="0" max="59"
                onChange={function(e){setG(function(v){return Object.assign({},v,{weekly:weeklyH*60+Math.min(59,Math.max(0,parseInt(e.target.value)||0))});});}}
                style={{width:"100%",background:C.input,border:"1px solid "+C.border,borderRadius:8,padding:"9px 8px",color:C.text,fontSize:16,textAlign:"center",outline:"none",boxSizing:"border-box",fontFamily:"'DM Mono',monospace",fontWeight:700}}/>

  function SettingsModal(){

    var umState = useState(null); var updateMsg=umState[0]; var setUpdateMsg=umState[1];

          </button>
          <button onClick={function(){setModal("settings");}} style={{background:"none",border:"none",cursor:"pointer",color:C.sub,padding:3,lineHeight:0}}>
            <svg width={18} height={18} viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
          </button>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"18px 16px 100px"}}>
        {pages[page]||<Dashboard/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.nav,borderTop:"1px solid "+C.border,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {nav.map(function(n){
          var active = page===n.id;
          var hasBadge = n.id==="review"&&todayDue.length>0;
          return (
            <button key={n.id} onClick={function(){setPage(n.id);}} style={{flex:1,padding:"10px 4px 8px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",color:active?"#f0a500":C.dim,position:"relative",minWidth:0}}>
              <Ic n={n.n} size={20}/>
              <span style={{fontSize:9,fontWeight:active?700:400,letterSpacing:.3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{n.lbl}</span>
              {hasBadge && <span style={{position:"absolute",top:7,right:"50%",transform:"translateX(8px)",width:7,height:7,background:"#f0a500",borderRadius:"50%",border:"1.5px solid "+C.nav}}/>}
            </button>
          );
        })}
      </div>

      {modal==="addRecord" && <AddRecordModal/>}
      {modal==="addSubject" && <SubjectModal/>}
      {modal&&modal.type==="editSubject" && <SubjectModal existing={modal.subject}/>}
      {modal&&modal.type==="addChapter" && <ChapterModal subjectId={modal.subjectId} onDone={modal.onDone}/>}
      {modal&&modal.type==="adjustReview" && <AdjustReviewModal chapter={modal.chapter}/>}
      {modal==="goals" && <GoalsModal/>}
      {modal==="exam" && <ExamModal/>}
      {modal==="settings" && <SettingsModal/>}

      {toast && (
        <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"9px 18px",fontSize:12,fontWeight:600,color:toast.color,zIndex:9999,boxShadow:"0 8px 32px rgba(0,0,0,.6)",whiteSpace:"nowrap",animation:"fadeUp .2s ease"}}>
          {toast.msg}
        </div>
      )}

      {/* 里程碑慶祝 */}
      {celebMsg && (
        <div style={{position:"fixed",inset:0,zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.7)"}} onClick={function(){setCelebMsg(null);}}>
          <div style={{background:C.card,border:"2px solid #f0a500",borderRadius:24,padding:"32px 40px",textAlign:"center",boxShadow:"0 0 60px rgba(240,165,0,.4)",animation:"fadeUp .3s ease"}}>
            <div style={{fontSize:64,marginBottom:12}}>🏅</div>
            <div style={{fontSize:14,color:C.sub,marginBottom:6,letterSpacing:2,textTransform:"uppercase"}}>里程碑達成！</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:48,fontWeight:800,color:"#f0a500",lineHeight:1}}>{celebMsg}</div>
            <div style={{fontSize:18,color:C.text,marginTop:4,fontWeight:700}}>天連續讀書</div>
            <div style={{fontSize:12,color:C.sub,marginTop:16}}>點任意處關閉</div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

if("serviceWorker" in navigator){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("sw.js").then(function(reg){
      window._swReg = reg;
      reg.addEventListener("updatefound",function(){
        var nw = reg.installing;
        nw.addEventListener("statechange",function(){
          if(nw.state==="installed"&&navigator.serviceWorker.controller){
            document.getElementById("update-banner").style.display="flex";
          }
        });
      });
    }).catch(function(){});
    navigator.serviceWorker.addEventListener("controllerchange",function(){
      window.location.reload();
    });
  });
}
</script>
<script>
function runApp(){
  try {
    var src = document.getElementById("app-source").textContent;
    var result = Babel.transform(src, {presets:["react"]});
    var s = document.createElement("script");
    s.textContent = result.code;
    // Add error catching wrapper
    document.body.appendChild(s);
  } catch(e) {
    var el = document.getElementById("err");
    if(el){ el.style.display="block"; el.textContent = "BABEL ERROR:\n" + e.message + "\n\n" + (e.stack||""); }
    console.error("Babel compile error:", e);
  }
}
// Wait for Babel to fully load before running
if(typeof Babel !== "undefined"){
  runApp();
} else {
  document.querySelector('script[src*="babel"]').addEventListener("load", runApp);
}
</script>
</body>
</html>
